# ── 验证用例命名规范 ──
naming_convention:
  format: "tc_{module}_{feature}_{seq}"
  examples:
    - tc_fetch_bpred_ltage_001
    - tc_decode_rv32i_alu_001
    - tc_clic_priority_preempt_001
    - tc_pmp_napot_access_001
    - tc_axi_burst_write_001

# ── 代码覆盖率目标 ──
code_coverage:
  line:
    target: 95
    unit: percent
    exclusion: "Dead Code (经 Waiver 审批)"
  toggle:
    target: 90
    unit: percent
    exclusion: "Reserved Bits, Unused Ports"
  branch:
    target: 95
    unit: percent
    exclusion: "不可达分支 (经 Formal 证明)"
  condition:
    target: 90
    unit: percent
  fsm:
    target: 100
    unit: percent
    exclusion: "全部状态和转换必须覆盖"

