# ──────────────────────────────────────────────
# Phase 定义 (P)
# 具体任务的工序阶段，复用 schema.yaml valid_phases
# ──────────────────────────────────────────────
# Phase 取值固定为 schema.yaml 定义的 7 项：
#   setup / requirements / architecture / design /
#   implementation / verification / delivery
#
# 使用方式：每项任务附加 phase 标签标识当前工序阶段
# 例：任务 T2.1 "模块设计文档" → phase: design
#     任务 T4.2 "回归测试"     → phase: verification

phase_options: [setup, requirements, architecture, design, implementation, verification, delivery]
