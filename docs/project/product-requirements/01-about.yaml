# ═══════════════ 1. 关于本文档 ═══════════════
section: "1. 关于本文档"
id: sec-about
description: "本文档定义 Lumi-Core RISC-V 处理器 IP 的完整产品需求，覆盖硬件功能、性能目标、交付物、安全合规及软件生态等方面，作为项目全生命周期的需求基线。"

sub_sections:
  - title: "1.1 参考文档"
    table_type: data
    headers: [编号, 文档名称, 版本, 路径/链接, 说明]
    rows:
      - [REF-01, Lumi-Core Profile, v1.0, "docs/profile/Lumi-Core-Profile.html", RISC-V Profile 定义]
      - [REF-02, RISC-V ISA Spec, "20240411", "docs/standards/riscv-specs/isa/", RISC-V 指令集规范]
      - [REF-03, RISC-V Privileged Spec, v1.12, "docs/standards/riscv-specs/isa/riscv-privileged.pdf", RISC-V 特权架构规范]
      - [REF-04, RISC-V Debug Spec, V1.0.0, "docs/standards/riscv-specs/extensions/riscv-debug-specification.pdf", RISC-V 调试规范]
      - [REF-05, RISC-V Nexus Trace Spec, V1.0.0, "docs/standards/riscv-specs/extensions/riscv-nexus-trace.pdf", RISC-V 跟踪规范]
