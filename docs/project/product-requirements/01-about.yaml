  - title: "1.2 术语与缩写"
    table_type: data
    headers: [术语/缩写, 全称, 说明]
    rows:
      - [ISA, Instruction Set Architecture, 指令集架构]
      - [PPA, "Performance, Power, Area", "性能、功耗、面积三大芯片设计指标"]
