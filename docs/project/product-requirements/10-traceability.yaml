# ═══════════════ 10. 需求追溯矩阵 ═══════════════
section: "10. 需求追溯矩阵"
id: sec-trace
description: "展示需求 → 架构章节 → 设计文档 → 验证用例的完整追溯链，确保每条需求有对应的设计和验证覆盖。"

traceability_structure:
  chain: "REQ-ID → 架构章节(platform-spec.html) → 模块设计文档(docs/design/) → 验证用例(tests/)"
  coverage_target: "100% Must 需求必须有对应的设计文档和验证用例"
  review_trigger: "每次里程碑门禁时检查追溯覆盖率"

