# ═══════════════ 9. 需求基线管理 ═══════════════
section: "9. 需求基线管理"
id: sec-baseline
description: "需求基线 (Baseline) 是整批需求的快照定版，用于版本锁定和发布追溯。基线列表详见 baselines/ 目录（权威数据源）。"

rules:
  - "需求集有独立的基线版本号 BL-{主版本}.{次版本}，与每条需求自身版本号分开维护。"
  - "定版 (Baseline Freeze) 时：点击基线定版按钮，系统自动收集所有 Approved+ 需求，为需求打上基线标签，并下载 baseline-{BL}.yaml 快照文件。"
  - "将 YAML 放入 docs/project/baselines/，运行 generate_baseline_html.py 生成 HTML 报告。"
  - "权威来源：baselines/ 目录下的 YAML 文件为下游流程（设计/验证/实现）的唯一参考依据。"
  - "定版后变更需求 → 版本 +0.1，基线标签清空，等待下次定版。"

change_management:
  versioning: "BL-{major}.{minor}，major 在架构变更时递增，minor 在需求增删时递增"
  process:
    - "1. 需求状态达到 Approved 或以上"
    - "2. 触发基线定版，输入基线版本号和描述"
    - "3. 系统自动收集合格需求并生成 YAML 快照"
    - "4. YAML 放入 baselines/ 目录，生成 HTML 报告"
    - "5. 定版后的变更需走变更请求流程（CR），版本+0.1"
  approval_required: true
  archive_policy: "旧基线移入 baselines/archive/ 保留不删除"

baselines: []
  # 基线列表详见 baselines/ 目录（权威数据源）。
  # 最新基线: baseline-BL-1.2.yaml
  # 历史基线: baselines/archive/
