# ──────────────────────────────────────────────
# 分层断言策略 (Phase 1 前置)
# ──────────────────────────────────────────────
assertion_strategy:
  pc_alignment:
    location: "lumi_fetch.sv, FSM always_comb 末尾"
    code: |
      // synthesis translate_off
      assert(pc_next[0] == 1'b0) else $error("PC not 2-byte aligned: 0x%08h", pc_next);
      // synthesis translate_on
  bytes_consumed_range:
    location: "lumi_predecode.sv, bytes_consumed 赋值后"
    code: |
      // synthesis translate_off
      assert(bytes_consumed inside {0, 2, 4, 6, 8, 10, 12, 14, 16})
        else $error("invalid bytes_consumed: %0d", bytes_consumed);
      // synthesis translate_on
  div_sign_verification:
    location: "lumi_execute.sv, DIV_DONE 状态"
    code: |
      // synthesis translate_off
      if (div_signed) begin
        logic exp_quot_sign, exp_rem_sign;
        exp_quot_sign = orig_dividend_sign ^ orig_divisor_sign;
        exp_rem_sign = orig_dividend_sign;
        assert(div_is_rem ? (div_result_r[31] == exp_rem_sign) : (div_result_r[31] == exp_quot_sign))
          else $error("DIV sign mismatch");
      end
      // synthesis translate_on

