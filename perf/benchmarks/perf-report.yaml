    dhrystone_dual: 1.41
    target_met: true

# =========================================================================
# 三视角分析结论
# =========================================================================

three_perspective_analysis:
  compiler:
    finding: "-O2 -funroll-loops 已发挥大部分收益，额外选项无效果"
    action: "保持当前编译器标志"
    conclusion: "编译器优化已饱和"

  rtl_comparison:
    finding: >
      LSQ 过度保守 (L1035-1039) 已修复为地址冲突检测。
      Load skip 被禁止 (L912) 但 WAR 修复失败。
      FU 每周期 1 条限制是 MinorCPU 固有限制。
    remaining_gaps:
      - "FU 竞争: 3 个 ALU FU 共享，无法在单周期内服务多条同类指令"
      - "Load skip WAR: 根本性设计问题，需要更复杂的机制"
    conclusion: >
      gem5 MinorCPU 建模精度已接近可改善的上限。
      进一步缩差需要大幅重构（简易 ROB 或非阻塞发射），
      这超出了当前项目约束（顺序执行、3 发射、8 级流水线）。

  theoretical_limit:
    finding: >
      IPC 从 1.51 提升到 1.80 (+19%) 在 Phase 9 已实现。
      实际达到 5.54 CM/MHz，超过理论预估的乐观上限 5.3-5.5。
    conclusion: >
      参数精调的效果超预期，特别是 executeLoadAssumedLatency=1 的推测性
      L1D hit 预测贡献了 +12.4% 的巨大收益。

