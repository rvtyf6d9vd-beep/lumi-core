  cortex_r82_reference:
    coremark: "5.83 CM/MHz (ARM published)"
    issue_width: 3
    pipeline: 8-stage
  n900:
    coremark: "~5.5+ CM/MHz (estimated)"
    issue_width: 2
    pipeline: 8-stage
  lumi_core:
    coremark: 5.54
    issue_width: 3
    pipeline: 8-stage
    gap_to_r82: "-5.0% (5.54 vs 5.83)"
    analysis: >
      Lumi-Core 在 gem5 MinorCPU 模型约束下已达到接近 Cortex-R82 的性能。
      5% 的差距主要来自 gem5 模型的保守调度和 FU 竞争建模。
