# Lumi-Core Phase 5 Performance Baseline
# Generated from Phase 4 benchmark runs (2026-06-29)
# These values serve as the optimization baseline for Phase 5.

baseline_version: "1.0"
captured_at: "2026-06-29"
environment:
  compiler: riscv64-unknown-elf-gcc (GCC) 16.1.0
  optimization: -O2 -march=rv64im -mabi=lp64 -ffreestanding
  simulator: gem5 build/RISCV/gem5.opt
  cpu_model: 8-stage MinorCPU (in-order, sequential execution)
  clock: 1GHz
  cache_l1i: 32KB 8-way LRU tag_lat=1 data_lat=1
  cache_l1d: 32KB 8-way LRU tag_lat=1 data_lat=2
  memory: DDR3_1600_8x8

cpu_params:
  issue_width: 3 (triple) / 2 (dual)
  fetch1FetchLimit: 1
  executeBranchDelay: 2
  branch_predictor: TournamentBP
  bp_localPredictorSize: 1024
  bp_globalPredictorSize: 4096
  bp_choicePredictorSize: 4096
  bp_CtrBits: 2
  fetch2InputBufferSize: 2
  decode1InputBufferSize: 3
  decodeInputBufferSize: 3
  issueInputBufferSize: 4  # issue_width+1
  executeInputBufferSize: 7
  memoryInputBufferSize: 3
  writebackInputBufferSize: 2
  executeLSQStoreBufferSize: 5
  executeLSQRequestsQueueSize: 1
  executeLSQTransfersQueueSize: 2
  dcache_data_latency: 2

coremark:
  config: TOTAL_DATA_SIZE=2000, ITERATIONS=50
  triple_issue:
    cm_per_mhz: 3.05
    cycles: 16446548
    instructions: 16510779
    cpi: 0.9961
    ipc: 1.0039
    bp_mispredict_rate: 3.30
    bp_squashes: 246645
    branch_penalty_pct: 12.00
    icache_miss_rate: 0.0030
    dcache_miss_rate: 0.0038
    inst_mix:
      int_alu_pct: 76.2
      int_mult_pct: 2.8
      mem_read_pct: 16.6
      mem_write_pct: 4.4
    target: 5.5
    target_met: false
  dual_issue:
    cm_per_mhz: 2.81
    cycles: 17861233
    instructions: 16510779
    cpi: 1.0818
    ipc: 0.9244
    bp_squashes: 218549
    branch_penalty_pct: 9.79

dhrystone:
  config: NUMBER_OF_RUNS=500
  triple_issue:
    dmips_per_mhz: 0.94
    cycles: 325844
    instructions: 280518
    cpi: 1.1602
    ipc: 0.8619
    bp_mispredict_rate: 1.70
    bp_squashes: 3721
    inst_mix:
      int_alu_pct: 62.4
      int_mult_pct: 0.2
      mem_read_pct: 22.5
      mem_write_pct: 14.7
  dual_issue:
    dmips_per_mhz: 0.89
    cycles: 343725
    cpi: 1.2239
    ipc: 0.8170

bottleneck_analysis:
  primary: "Branch penalty (12% of cycles in CoreMark)"
  secondary: "Low IPC (1.0 vs theoretical 3.0) due to in-order dependencies"
  not_bottleneck: "Cache miss rates (0.004% D, 0.003% I - excellent)"
  note: "5.5 CM/MHz target is achievable - Nuclei N900 and T-Head R908 (dual-issue) reach it"

# ═══════════════════════════════════════════════════════════
# V1 RTL Direct Performance Data (2026-07-14)
# T-MS3-S2-4: CoreMark V1 全面修复后
# 由 Verilator 仿真直接测量, 非 gem5
# ═══════════════════════════════════════════════════════════
v1_rtl_baseline:
  captured_at: "2026-07-14"
  capture_method: "Verilator V1 TB direct measurement"
  simulator: "Verilator 5.x (--timing mode)"
  environment:
    compiler: riscv64-unknown-elf-gcc (GCC) 16.1.0
    optimization: "-O2 -funroll-loops -march=rv32imac -mabi=ilp32 -ffreestanding"
    cpu_model: "Lumi V1 RTL (8-stage pipeline, 3-wide issue, BYPASS_SB=1)"
    clock: "1 GHz (1 cycle = 1 ns)"
    memory: "V1 SRAM TCM 256KB @ 0x0, 32-bit word, single-cycle"
    link_script: "lumi-v1-bench.ld (TCM ORIGIN=0x0)"
    startup: "crt0_v1.S + v1_lib.c (8-byte aligned malloc, mtvec trap handler)"

  coremark_size_2000:
    status: "STALL-FREE TIMEOUT (2B cycles)"
    total_cycles: 2000000001
    total_retired: 1558884000
    ipc: 0.78
    mem_busy: 0
    we_count: 67800000
    wall_time_seconds: 3408
    verilator_speed_us_per_s: 2.023
    sim_cycles_per_wall_sec: 580000
    target_completion: "未达 ECALL 退出点 (需 3-5B cycles)"
    notes: >
      RTL 表现优秀: 0 trap / 0 misalign / 0 PC restart / 0 stall。
      1.55B 指令全部正确 commit, SRAM 写入 67.8M 次, mem_busy 全程 0。
      BYPASS_SB=1 (store 直写 SRAM) + mem_busy 全程反压, 牺牲 IPC 换简单性。

  coremark_size_500_estimate:
    status: "RUNNING (预估 2-3B cycles 完成)"
    estimated_completion_cycles: 2500000000
    estimated_wall_time_minutes: 75
    notes: "SIZE 减小 4x 预计 cycles 减小 ~4x, 但 IPC 模式不变"

  comparison:
    gem5_coremark:
      cm_per_mhz: 6.22
      ipc: 2.017
      notes: "Phase 5 gem5 MinorCPU triple-issue, 完整 L1 cache, 8-stage"
    v1_rtl_coremark:
      cm_per_mhz: "TBD (CoreMark 未完成)"
      ipc: 0.78
      notes: "V1 RTL 3-issue, BYPASS_SB=1, no L1 cache (TCM)"
    gap_analysis:
      - "IPC gap 0.78 vs 2.017 (38% of gem5): V1 调度保守, mem_busy 全程反压"
      - "BYPASS_SB=1 简化 FSM 但减少 store buffer 优化机会"
      - "3-issue 调度规则保守 (WAW/WAR 全部 stall)"
      - "无 store forwarding (依赖 LSU 直读 SRAM 路径)"

  issues_addressed_in_baseline:
    - "SA-1/ERR-029: LSU Port 1 在 BYPASS_SB FSM 中被丢弃 (FIXED)"
    - "SA-2/ERR-032: M 级旁路对 Load 传递地址而非数据 (FIXED)"
    - "SA-3: Load 结果硬编码为 LSU Port 0 (FIXED 随 SA-1)"
    - "SA-4: m_valid_out 不反映 FSM 实际处理状态 (FIXED)"
    - "SA-5/ERR-036: Writeback Slot 2 寄存器写回被丢弃 (FIXED 延迟写回)"
    - "SA-6: E1->M 流水线寄存器无 stall 保护 (FIXED)"
    - "SA-9/ERR-034: m1_mem_* 寄存器无 mem_busy stall 保护 (FIXED)"
    - "SA-10/ERR-035: M 级旁路 valid/result 不同步 CRITICAL (FIXED m_bypass_valid)"
    - "SA-8a/ERR-038: malloc 返回未对齐指针 (FIXED 8-byte align)"
    - "SA-8b/ERR-039: static_memblk 无对齐声明 (FIXED aligned(8))"
    - "SA-11/ERR-037: crt0_v1 未设 mtvec 死循环 (FIXED trap handler)"
    - "SA-12/ERR-040: TOTAL_DATA_SIZE=2000 避免 core_list_init 下溢 (FIXED)"

  open_issues:
    - "ERR-042: CoreMark V1 完整跑通需 >2B cycles (TB timeout 不够, 待优化)"
    - "ERR-021: Dhrystone V1 store misalign 异常 (独立问题, 未修复)"
