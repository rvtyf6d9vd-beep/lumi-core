# Lumi 通用项目规则（27 条）
# 源自 Top Rules_Optimized.md 第三章

rules:
  # ── 3.1 可追溯性 ──
  - id: "03"
    title: "工作留痕"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      所有工作必须留痕，以备未来的跟踪和审查。原则上老的内容必须保留而不是被覆盖，
      最新状态可以根据日期生成新的文件递进更新。粒度暂定一天（一天内的内容可以覆盖
      而不是拆分成多个文件，Agent 自行判断）。
    check_type: automated
    check_criteria:
      - "每个工作日必须有对应的 audit/instruction-log/YYYY-MM-DD.yaml"
      - "git 提交记录每天至少一条"
    audit_role: true

  - id: "16"
    title: "指令记录"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      建立一个机制，把每条指令都存下来。如果是选择类的，把所有选项和我的选择都记录下来。
    check_type: automated
    check_criteria:
      - "audit/instruction-log/ 目录下每天有对应日志文件"
      - "选择类指令需记录全部选项和最终选择"
    audit_role: true

  # ── 3.2 文档管理 ──
  - id: "14"
    title: "HTML 文档格式与索引"
    category: general
    severity: medium
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      供人类参考的文件应尽可能使用 HTML 格式，并用图文和超链接的方式串联形成文档地图。
      项目管理用单一文件，但可以索引到其他文件（如子里程碑的执行计划），来完成扩展。
    check_type: automated
    check_criteria:
      - "docs/ 目录下人类参考文件使用 .html 格式"
      - "docs/index.html 存在且包含到所有子文档的超链接"
      - "docs/project/master-plan.html 存在且包含里程碑索引"
    audit_role: true

  - id: "19"
    title: "里程碑文档检查"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [architecture, design, implementation, verification, delivery]
    description: >
      每次里程碑达成时必须对相关文档做一轮全局检查，确认是否需要更新，可制定相关策略。
    check_type: hybrid
    check_criteria:
      - "里程碑门禁报告中包含文档时效检查项"
      - "所有文档的最后更新日期在里程碑周期内"
    audit_role: true

  # ── 3.3 标准与规范 ──
  - id: "05"
    title: "RISC-V Profile 与文档"
    category: general
    severity: critical
    applicable_roles: [hw-design, hw-ver]
    applicable_phases: [requirements, architecture]
    description: >
      基于 RISC-V 准文档制定属于整个项目的 Profile（可使用或参考 RVM23）。
      标准文档定期更新，但 Profile 只考虑已被 Ratified 的更新。
      提醒用户决定是否要接受更改的新标准，让用户决定。
      RISC-V 相关文档必须本地化（选择合适的本地文件夹放置），定期更新。
    check_type: manual
    check_criteria:
      - "docs/standards/riscv-profile.html 存在"
      - "Profile 中仅包含 Ratified 状态的扩展"
      - "docs/standards/riscv-specs/ 目录下有最新版本的 RISC-V 标准文档"
    audit_role: true

  - id: "12"
    title: "基准测试统一化"
    category: general
    severity: medium
    applicable_roles: [hw-design, hw-ver, pm-infra]
    applicable_phases: [architecture, design, implementation, verification]
    description: >
      基准测试平台（如 CoreMark）必须统一化，相关参数必须统一管理。
    check_type: automated
    check_criteria:
      - "perf/benchmarks/ 目录下有统一的配置文件"
      - "基准测试参数有统一的 YAML 配置"
    audit_role: true

  # ── 3.4 架构与设计 ──
  - id: "06"
    title: "性能评估模型"
    category: general
    severity: high
    applicable_roles: [hw-design]
    applicable_phases: [requirements, architecture]
    description: >
      进入实际项目之前，需要先建立性能评估模型（例如基于 GEM5+ 的 Cycle Model）。
    check_type: manual
    check_criteria:
      - "perf/gem5-model/ 目录下有可运行的性能模型"
    audit_role: true

  - id: "07"
    title: "平台架构说明书"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [architecture, design]
    description: >
      平台架构说明书起到总揽全局的作用，应包含处理器架构相关的全局内容和详细的硬件需求清单。
    check_type: manual
    check_criteria:
      - "docs/architecture/platform-spec.html 存在"
      - "包含完整的硬件需求清单"
    audit_role: true

  - id: "08"
    title: "编码前写文档"
    category: general
    severity: critical
    applicable_roles: [hw-design]
    applicable_phases: [design, implementation]
    description: >
      进入 RTL 设计阶段，所有编码工作必须先写文档，承接平台架构的硬件需求
      （要求每个需求都有承接），文档内容必须细化到具体的设计或验证的详细设计。
    check_type: hybrid
    check_criteria:
      - "每个 src/ 子模块在 docs/design/ 下有对应的设计文档"
      - "设计文档中的需求可追溯到 platform-spec.html"
    audit_role: true

  # ── 3.5 验证与质量 ──
  - id: "09"
    title: "验证方案框架"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-ver]
    applicable_phases: [architecture, design, verification]
    description: >
      建立完整的验证方案框架设计，生成完整的验证策略。
      验证案例必须证明能完整覆盖设计的所有需求和接口。
    check_type: manual
    check_criteria:
      - "docs/verification/ 目录下有验证方案文档"
      - "验证用例到需求的覆盖率矩阵存在"
    audit_role: true

  - id: "10"
    title: "里程碑门禁"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [architecture, design, implementation, verification, delivery]
    description: >
      所有里程碑必须有强制门禁，必须完成全面核查才能进入下一步。
    check_type: hybrid
    check_criteria:
      - "audit/compliance-reports/ 下有每个里程碑的门禁报告"
      - "门禁报告中所有检查项状态为 PASS"
      - "人类项目负责人已签署确认"
    audit_role: true

  - id: "11"
    title: "每日集成回归"
    category: general
    severity: high
    applicable_roles: [hw-design, hw-ver, pm-infra]
    applicable_phases: [design, implementation, verification]
    description: >
      每个比较大的进展（以天为单位甚至更短）都必须完成集成和回归测试。
    check_type: automated
    check_criteria:
      - "CI 回归测试每日运行"
      - "回归通过率 100%"
    audit_role: true

  - id: "18"
    title: "问题不允许跳过"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [design, implementation, verification, delivery]
    description: >
      每次测试或验证遇到问题不允许回避，需要尽可能解决。如果问题无法解决，
      记录一个项目风险项等后来解决，不允许跳过。
    check_type: hybrid
    check_criteria:
      - "audit/risk-register.yaml 中无 status: skipped 的项目"
      - "所有已知问题有对应的风险条目"
    audit_role: true

  # ── 3.5.1 Errata/Known Issue 维护 ──
  - id: "20"
    title: "Errata/Known Issue 维护"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [design, implementation, verification, delivery]
    description: >
      维护一份 Errata/Known Issue 文档，专门记录所有已知问题（Known Issue / Errata），
      直到该问题被彻底解决。Errata 条目应包含：问题标识、简要描述、发现日期、
      影响范围、当前状态（open/resolved）、临时规避方案（如有）等。
      问题解决后更新状态为 resolved 并注明解决日期和方式，但保留记录不删除。
    check_type: automated
    check_criteria:
      - "audit/errata/known-issues.yaml 存在且格式合规"
      - "所有已知问题在 errata 中有对应条目"
      - "已解决问题保留记录且标注 resolved"
    audit_role: true

  # ── 3.5.2 Bug 回归测试用例 ──
  - id: "21"
    title: "Bug 回归测试用例"
    category: general
    severity: critical
    applicable_roles: [hw-design, hw-ver, pm-infra]
    applicable_phases: [verification, delivery]
    description: >
      在达到 RTL Freeze 里程碑之后，每个发现的 Bug 必须增加对应的回归测试用例，
      以保证后续修改不会导致相同问题重现。回归测试用例随项目持续维护，
      直到该回归测试用例因设计变更不再适用（此时应更新或废弃该用例并记录原因）。
    check_type: automated
    check_criteria:
      - "每个已修复 Bug 有对应的回归测试用例"
      - "回归测试用例可追溯至对应的 Bug/Errata 记录"
      - "废弃的回归测试用例有废弃原因记录"
    audit_role: true

  # ── 3.6 版本管理 ──
  - id: "13"
    title: "GitHub 版本管理"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      使用 GitHub 进行版本管理，建立一套明确的版本管理机制。
    check_type: automated
    check_criteria:
      - ".git 目录存在"
      - "远程仓库已配置"
      - "分支保护策略已启用"
    audit_role: true

  # ── 3.7 文件操作 ──
  - id: "17"
    title: "批量删除须确认"
    category: general
    severity: high
    applicable_roles: [pm-infra]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      批量（一次超过三个文件）删除任何小于 1MB 的文件都需要询问用户，
      更好的办法是存档而不是删除。
    check_type: manual
    check_criteria:
      - "audit/instruction-log/ 中批量删除操作有用户确认记录"
    audit_role: true

  # ── 3.8 工具与复用 ──
  - id: "22"
    title: "Skill 优先复用"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      在项目根目录维护一个 skills/ 目录作为项目 Skill 列表，收录经过验证的可用 Skill
      （如 GEM5 建模、CLIC 验证、回归测试运行等可复用能力）。
      每当执行任务时，应优先从 skills/ 列表中查找是否已有可用 Skill，
      或能否通过轻量修改后复用，避免重复造轮。
      新 Skill 收录需经过 review，确保质量。
    check_type: automated
    check_criteria:
      - "skills/ 目录存在且包含 index.yaml 索引"
      - "每个 Skill 文件含 name、description、usage 和 files_required 字段"
      - "任务执行前检查 skills/ 目录是否有匹配 Skill"
      - "审计周期内重复造轮次数为 0"
    audit_role: true

  # ── 3.9 里程碑层级定义 ──
  - id: "23"
    title: "Milestone/Stage/Phase 层级定义"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      项目进度采用三层结构管理：

      Milestone (MS) —— 项目级大里程碑，对应强制门禁节点。
      命名：M0, M1, M2, ... 定义在 docs/project/milestone-plan.yaml 中。
      每个 Milestone 必须通过门禁检查（规则 10）才能进入下一个。

      Stage (S) —— Milestone 内部的工作阶段细分，一组有明确交付目标的任务集合。
      命名：MS-{序号}-S{阶段号}，如 M1-S1（需求定版）、M1-S2（架构定义）。
      Stage 根据里程碑计划按需定义和调整。

      Phase (P) —— 具体任务的不同工序阶段，复用 schema.yaml 中定义的 valid_phases
      （setup / requirements / architecture / design / implementation / verification / delivery）。
      每项任务使用 Phase 标签标识当前所在的工序阶段。

      关系示例：Milestone M1（架构与需求冻结）包含 Stage M1-S1（需求定版），
      其中 PRD 任务处于 Phase: review/approved 阶段。
    check_type: automated
    check_criteria:
      - "docs/project/milestone-plan.yaml 存在且定义所有 MS 和 S"
      - "每个任务有明确的 Phase 标记"
      - "Milestone 门禁报告引用 MS 编号（规则 10）"
      - "role-mapping.yaml 中 applicable_phases 与 schema.yaml 一致"
    audit_role: true

  # ── 3.10 门禁权限 ──
  - id: "24"
    title: "门禁不可自解释或降低"
    category: general
    severity: critical
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [architecture, design, implementation, verification, delivery]
    description: >
      门禁检查过程中，AI Agent 不得自行解释门禁标准、自行降低门禁要求
      或自行标注门禁通过。任何门禁标准的调整或豁免必须由人类项目负责人
      介入并签署确认后方可生效。门禁报告中的每一项 PASS 状态必须有明确的
      人类确认记录（如 sign-off 签名、审批评论或会议纪要），不得由 AI 独立
      判定。门禁标准本身（检查项、通过条件）的调整也需要正式变更记录和
      人类 Sign-off。
    check_type: automated
    check_criteria:
      - "门禁报告中每项 PASS 有对应人类确认记录（签名/审批/纪要）"
      - "无 AI 自行标注 PASS 而无人类确认的情况"
      - "门禁标准调整有正式变更记录和人类 Sign-off"
    audit_role: true

  # ── 3.11 计划审核与风险 ──
  - id: "25"
    title: "复杂计划交叉审查建议"
    category: general
    severity: medium
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      当智能体（AI Agent）制定计划，并判断该计划因其复杂度可能引入风险时
      （如涉及重大架构变更、多模块耦合、技术不确定性高、或跨角色协调等），
      必须在计划文档的醒目位置（如标题下方或风险章节开头）显式建议
      计划审核者使用多个不同的模型或系统进行交叉审查与验证，
      以降低单一模型视角可能带来的盲区。
    check_type: automated
    check_criteria:
      - "高风险/高复杂度计划文档中包含交叉审查建议"
      - "交叉审查建议位于计划文档醒目位置（标题下方/风险章节开头）"
      - "建议内容明确提及'多模型交叉审查'或'交叉验证'"
    audit_role: true

 # ── 3.12 计划编码（两级体系）──
  - id: "26"
    title: "计划统一编码"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      计划文档采用两级管理：

      **注册级（plan_id）** —— 仅限里程碑级别的计划文档（如 milestone-plan.yaml、
      master-plan.html、部署计划等）注册全局 PLN-{4位序号}，序号递增永不重置。
      注册级计划需在 docs/project/plan-registry.yaml 中登记，标题下方标注 plan_id。

      **备案级（归档）** —— 细颗粒度的执行计划、阶段计划、专项计划等，
      统一存档到 docs/plans/ 对应子目录即可，不注册 plan_id，不占用全局序号。
      备案级计划使用"父级 plan_id + 内部编号"自描述（如 M3-S2-Task01），
      避免在每个计划内部从 Task 1 / Batch 1 等局部编号重新开始。
    check_type: automated
    check_criteria:
      - "docs/project/plan-registry.yaml 存在且所有注册级计划已登记"
      - "注册级计划文档在标题醒目位置标注 plan_id（PLN-xxxx）"
      - "备案级计划统一存放在 docs/plans/ 子目录"
      - "备案级计划使用'父计划+内部序号'编号体系，无重复起始"
      - "全局序号无跳号、无重复"
    audit_role: true

  # ── 3.13 计划存档 ──
  - id: "27"
    title: "计划文档统一存档"
    category: general
    severity: high
    applicable_roles: [pm-infra, hw-design, hw-ver, qa-audit]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      所有计划文档（包括注册级和备案级）必须统一归档到 docs/plans/ 目录下，
      按计划类别分门别类放入子目录（如 milestone/、execution/、verification/、
      gem5/、deployment/）。

      注册级计划（有 plan_id）：文件名建议包含 plan_id 以方便检索。
      备案级计划（无 plan_id）：按所属大类归入子目录，文件名保持描述性即可。

      创建计划时，原始文档存入对应子目录；执行过程中的变更记录
      （checkpoint tag、修改纪要、复盘记录）以子目录或附注文件形式同步保存。
      已有计划应渐进迁移至 docs/plans/，并在原位置保留软链接或跳转说明。
    check_type: automated
    check_criteria:
      - "docs/plans/ 目录存在且含子目录分类"
      - "注册级计划在对应子目录下有文档，文件名含 plan_id"
      - "备案级计划在对应子目录下存档"
      - "plan-registry.yaml 中注册级 plan 的 file 字段指向 docs/plans/ 下的文件"
      - "已迁移计划的原位置有跳转说明"
    audit_role: true
