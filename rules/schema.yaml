# Lumi 规则元数据 Schema 定义
# 所有规则 YAML 文件必须符合此 Schema

schema_version: "1.0"

rule_fields:
  required:
    - id            # 规则编号（如 "03", "HD-1", "QA-1", "B-1"）
    - title         # 规则标题
    - category      # 分类: general | hardware-design | hardware-verify | it-infra | qa-audit | business
    - severity      # 严重度: critical | high | medium | low
    - applicable_roles  # 适用角色列表
    - description   # 规则完整描述

  optional:
    - applicable_phases  # 适用阶段列表
    - check_type        # 检查类型: automated | manual | hybrid
    - check_criteria    # 量化检查标准
    - audit_role        # QA 审计时是否检查此规则 (true/false)

valid_roles:
  - pm
  - hw-arch
  - hw-ver
  - sw-arch
  - ai-infra
  - qa-audit

valid_categories:
  - general
  - hardware-design
  - hardware-verify
  - it-infra
  - qa-audit
  - business

valid_severities:
  - critical
  - high
  - medium
  - low

valid_phases:
  - setup
  - requirements
  - architecture
  - design
  - implementation
  - verification
  - delivery
