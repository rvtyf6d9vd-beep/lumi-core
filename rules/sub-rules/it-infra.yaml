# Lumi 子规则：IT 基础设施（IT-1 ~ IT-2）
# 源自 Top Rules_Optimized.md 第六章

rules:
  - id: "IT-1"
    title: "知识库建设与维护"
    category: it-infra
    severity: high
    applicable_roles: [pm-infra]
    applicable_phases: [setup, requirements, architecture, design, implementation, verification, delivery]
    description: >
      建立和持续迭代知识库：① 维护设计和修改的记录文件内容，增加复盘内容，不断提炼和优化能力；
      ② 提炼和优化的能力必须保持规模可控，原则上不超过 256 条。
    check_type: automated
    check_criteria:
      - "knowledge/index.yaml 存在且条目数 ≤ 256"
      - "每条知识库条目包含来源和日期"
      - "超过 240 条时触发 WARNING"
    audit_role: true

  - id: "IT-2"
    title: "里程碑流程总结"
    category: it-infra
    severity: medium
    applicable_roles: [pm-infra]
    applicable_phases: [architecture, design, implementation, verification, delivery]
    description: >
      流程和规则也需要在每个里程碑结束后进行总结，提出优化建议，留待下个项目参考。
    check_type: manual
    check_criteria:
      - "每个里程碑完成后 knowledge/lessons-learned/ 下有流程总结文件"
      - "总结包含优化建议"
    audit_role: true
