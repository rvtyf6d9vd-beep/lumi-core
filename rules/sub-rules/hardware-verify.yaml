# Lumi 子规则：硬件验证（HV-1 ~ HV-2）
# 源自 Top Rules_Optimized.md 第五章

rules:
  - id: "HV-1"
    title: "验证前检查更新"
    category: hardware-verify
    severity: high
    applicable_roles: [hw-ver]
    applicable_phases: [design, implementation, verification]
    description: >
      每次展开工作都应检查更新，防止验证 Case 不匹配设计的变更。
    check_type: hybrid
    check_criteria:
      - "角色切换到 hw-ver 时，Pre-Check 步骤检查 change-notices/ 中是否有设计变更通知"
      - "验证用例版本与设计版本匹配"
    audit_role: true

  - id: "HV-2"
    title: "验证报错处理规范"
    category: hardware-verify
    severity: critical
    applicable_roles: [hw-ver]
    applicable_phases: [verification]
    description: >
      验证报错应立即检查是否是自身环境或验证 Case 的问题。可以简单修改源代码做调试，
      但修改的最后必须回退到测试前状态，最后把问题汇总并提交给硬件设计 Agent 接手处理。
    check_type: manual
    check_criteria:
      - "验证发现的 Bug 有对应的变更通知发送给 hw-design"
      - "调试过程中的源代码修改已回退"
      - "问题汇总记录在 audit/instruction-log/ 中"
    audit_role: true
