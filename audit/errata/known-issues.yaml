  - id: "ERR-037"
    title: "V1 crt0_v1.S 未设置 mtvec, 异常时 PC 跳到 0x0 死循环 (SA-11)"
    description: >
      crt0_v1.S (V1 Verilator 启动代码) 启动时未设置 mtvec CSR。异常触发后
      PC 跳转到 mtvec=0x00000000 (复位向量), 程序从头执行, 表现为无限重启
      循环 (PC Restarts > 0)。任何 trap 都会被这个 bug 放大成 TIMEOUT。
    discovered_date: "2026-07-14"
    discovered_by: hw-ver
    affected_modules: ["perf/benchmarks/libc/crt0_v1.S"]
    affected_versions: ["v1"]
    severity: critical
    status: resolved
    workaround: "已修复 (添加 trap handler)"
    resolved_date: "2026-07-14"
    resolved_by: hw-design
    resolution: >
      crt0_v1.S: 在 BSS clear 之后添加 trap handler 设置:
      ```
      la t0, _trap_handler
      csrw mtvec, t0
      ```
      _trap_handler 函数 (halt-and-report 策略):
      (1) 构造 0x3FFE0 地址 (lui 0x40 + addi -32, 因为 0xFE0 超出 addi
          12-bit signed 范围 -2048~2047);
      (2) 写失败标记 0xDEAD0001 到 0x3FFE0 (区别于 0xDEADBEEF 成功标记);
      (3) 写 mcause 到 0x3FFE4, mepc 到 0x3FFE8 (调试用);
      (4) li a0, 1 (FAIL); li a7, 93; ecall 退出。
      验证: ERR-035 (SA-10) 修复后 store misalign 不再发生, 但 trap handler
      仍作为安全网存在。
    regression_test: "perf/benchmarks/libc/crt0_v1.S"

