  - id: "ERR-098"
    title: "DIVU/REMU 有符号判断逻辑错误 — 无符号除法被当作有符号处理"
    description: >
      CoreMark 调试通路静态分析发现 lumi_execute.sv 中 div_signed 计算
      公式 `funct3[0] ^ (funct3 == MUL_DIV || funct3 == MUL_REM)` 对
      DIVU(101) 和 REMU(111) 产生 div_signed=1 (有符号), 但应为 0 (无符号)。
      原因: funct3[0]=1 时 XOR 0 = 1, 误判为有符号。导致无符号除法
      操作数被取绝对值, 结果符号被错误修正。
    discovered_date: "2026-07-14"
    discovered_by: hw-design (CoreMark static analysis)
    affected_modules: ["src/rtl/core/lumi_execute.sv"]
    affected_versions: ["v0.2"]
    severity: critical
    status: open
    workaround: "N/A — 必须修复"
    resolved_date: null
    resolved_by: null
    resolution: null
    regression_test: "tests/directed/rv32m_divu_test.S"

  - id: "ERR-099"
