  - id: "ERR-093"
    title: "OP_ZICOND opcode 值错误导致 Zicond 指令静默误执行"
    description: >
      第2轮静态分析发现 lumi_decode_issue.sv 第81行 OP_ZICOND = 7'b0111011 不正确。
      RISC-V Zicond 规范中 CZERO.EQZ 使用 opcode=0110011 (OP), CZERO.NEZ 使用
      opcode=0010011 (OP-IMM), 均配合 funct7=0000111/funct3=011 编码。
      当前 opcode 值 0111011 不是 Zicond 的有效编码。真实 Zicond 指令会落入 OP_REG
      case 被当作普通 ALU 指令静默误执行, 而非触发非法指令异常。
      这比'未实现'更危险, 因为产生错误结果却不报异常。
    discovered_date: "2026-07-15"
    discovered_by: rtl-static-scan-r2
    affected_modules: ["core/lumi_decode_issue"]
    affected_versions: ["v0.2"]
    severity: critical
    status: resolved
    workaround: "移除 OP_ZICOND 常量, 在 OP_REG/OP_IMM case 中检测 funct7==0000111 并触发非法指令"
    resolved_date: "2026-07-15"
