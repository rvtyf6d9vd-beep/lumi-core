  - id: "ERR-041"
    title: "crt0_v1.S 0xFE0 addi 立即数超出 12-bit signed 范围"
    description: >
      crt0_v1.S: 构造 0x3FFE0 地址时原计划用 `lui 0x3F + addi 0xFE0`,
      但 0xFE0 = 4064 超出 addi 12-bit signed 范围 (-2048~2047),
      汇编器报 "illegal operands" 错误。
    discovered_date: "2026-07-14"
    discovered_by: hw-ver
    affected_modules: ["perf/benchmarks/libc/crt0_v1.S"]
    affected_versions: ["v1"]
    severity: minor
    status: resolved
    workaround: "已修复 (lui 0x40 + addi -32)"
    resolved_date: "2026-07-14"
    resolved_by: hw-design
    resolution: >
      改用 `lui 0x40 + addi -32` 构造 0x3FFE0 地址 (0x40000 - 32 = 0x3FFE0)。
      -32 = 0xFFFFFFE0, 在 12-bit signed 范围 (-2048) 之外但作为字面量
      `addi t0, t0, -32` 汇编器接受。
    regression_test: "perf/benchmarks/libc/crt0_v1.S"

  - id: "ERR-042"
    title: "CoreMark V1 无法完成 — Fetch PC 非对齐 (0x178) 导致 trap 循环"
    description: >
      CoreMark V1 SIZE=2000 ITERATIONS=1 仿真在 2B cycles timeout 内
      未到达 ECALL 退出点。v4 Phase A 调试发现:
      (1) 启动早期 5 次 PC RESTART (0x178→0x0), 0x178 是 JAL 0x176 的
          中间字节, 非有效指令边界;
      (2) 之后核心以 IPC=0.78 正常运行到 148M cycles, 但 PROGRESS 停止;
      (3) TB 2B cycles 超时机制未触发, 仿真继续到 2.2B+ cycles (手动 kill)。
      根因分析: fetch 单元 PC 计算出现非对齐, 导致指令解码失败触发异常,
      程序陷入 trap 循环 (PC 0x0→0x178→0x0)。v3 I=50 的 2B TIMEOUT 也是
      同样原因 — 程序并非需要更多 cycles, 而是卡在 trap 循环中。
      关联: ERR-020~ERR-025 (BGEU/分支预测修复) 可能引入了新的 PC 计算问题。
    discovered_date: "2026-07-14"
    updated_date: "2026-07-14"
    discovered_by: hw-ver
    affected_modules:
      - "src/rtl/core/lumi_fetch.sv"
      - "src/rtl/core/lumi_decode_issue.sv"
      - "src/rtl/core/lumi_core_top.sv"
      - "src/tb/top/lumi_v1_tb_top.sv"
    affected_versions: ["v1"]
    severity: critical
    status: open
    workaround: >
