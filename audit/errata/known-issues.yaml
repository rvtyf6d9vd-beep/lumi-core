    regression_test: null

  - id: "ERR-022"
    title: "V1 JAL 指令 ra 寄存器不写 (RET 读到 ra=0, 程序重启)"
    description: >
      V1 流水线在执行 JAL 指令时, 链接寄存器 ra (x1) 始终不写入, 导致后续
