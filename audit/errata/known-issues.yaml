  - id: "ERR-023"
    title: "V1 LUI/AUIPC ALU 路径在 E1 execute 模块中误用 funct7"
    description: >
      V1 execute.sv 的 FU_ALU 路径中, LUI/AUIPC 指令原本走
      alu_compute(funct3, funct7[5], rs1, rs2) 默认路径, 但
      (1) LUI 不需要任何 rs1/rs2 操作数, 仅需 imm 移位;
      (2) AUIPC 是 PC + imm, 不是 rs1 + rs2;
      (3) inst[31:25] 字段对 U-type 是 imm[31:25], 不能作 funct7 使用。
      LUI 0x5 实际正确编码是 0x00005537, 但 alu_compute 把
      funct7=0x00005537 >> ? 的位误用, 触发错误路径。
      在 ERR-024 修复过程中作为关联问题一并修复 (LUI/AUIPC 提前到
      if 分支显式赋值, 跳过 funct7 case)。
    discovered_date: "2026-07-11"
    discovered_by: hw-ver
    affected_modules:
      - "src/rtl/core/lumi_execute.sv"
    affected_versions: ["v1"]
    severity: major
    status: resolved
    workaround: >
      在 V1 测试中避免使用 LUI/AUIPC, 或在测试程序中手动展开 (不实用)。
    resolved_date: "2026-07-11"
    resolved_by: hw-design
    resolution: >
      execute.sv FU_ALU: 在 funct7 case 之前, 增加 if 分支显式实现 LUI (opcode=7'b0110111)
      和 AUIPC (opcode=7'b0010111): e1_result[i] = {inst[31:12], 12'h000} (LUI)
      或 pc + {inst[31:12], 12'h000} (AUIPC)。同时新增 if 块跳过 funct7 case
      (避免被 Zba/Zbb 路径覆盖), 完整修复见 ERR-024。
    regression_test: "tests/directed/test_bgeu_taken_v3.S"
    related_errata: ["ERR-024"]

  - id: "ERR-024"
    title: "V1 OPIMM 指令 ALU 路径错误 (ADDI 用 rs2 而非 imm)"
    description: >
      V1 execute.sv 的 FU_ALU 路径中, OPIMM 指令 (ADDI/SLTI/SLTIU/XORI/ORI/ANDI/
      SLLI/SRLI/SRAI, opcode=7'b0010011) 走 case (funct7) 的 default 分支, 使用
      alu_compute(funct3, funct7[5], rs1, rs2) 计算结果。但存在两个错误:
      (1) ADDI 等 OPIMM 指令应该用 rs1 + imm, 不是 rs1 + rs2;
      (2) OPIMM 的 inst[31:25] 实际是 imm 的高 7 位 (I-type 编码), 不应作 funct7 使用。
      当 imm bit 10 = 1 时, inst[31:25] bit 5 = 1 触发 SUB 分支, 计算结果错误
      (例如 ADDI 0x678 实际计算 0x5000 - 0x678 = 0x4988)。
      后果: E1→E1 bypass 测试中, LUI 0x5 写 x10=0x5000, ADDI 0x678 读 x10 应得
      0x5678, 实际得 0x4988, bypass 看似不工作 (实际 bypass 正常, ALU 算错)。
      此 bug 在 CoreMark/Dhrystone 跑不通的根因排查中发现 (test_bgeu_taken_32
      期望 a0=0x5678 但实际为 0x4988)。
    discovered_date: "2026-07-11"
    discovered_by: hw-ver
    affected_modules:
      - "src/rtl/core/lumi_execute.sv"
    affected_versions: ["v1"]
    severity: critical
    status: resolved
    workaround: >
      在 V1 测试中避免 OPIMM 指令 (不实用, 几乎所有算术指令都用 ADDI)。
    resolved_date: "2026-07-11"
    resolved_by: hw-design
    resolution: >
      execute.sv FU_ALU: 在 funct7 case 之前, 增加 if 分支 (opcode=7'b0010011) 显式
      实现 OPIMM 9 条指令, 用 case (funct3) 区分: ADDI 用 rs1 + imm, SLTI/SLTIU 用
      比较结果, XORI/ORI/ANDI 用位运算, SLLI/SRLI/SRAI 用 inst[30] 区分算术/逻辑
      移位 (SRAI inst[30]=1, SRLI inst[30]=0)。同时新增 if 块跳过 funct7 case
      (避免被 Zba/Zbb 路径覆盖), LUI/AUIPC 同样处理 (见 ERR-023)。
      验证: test_bgeu_taken_32 中 a0=0x5678 正确 (BGEU taken → LUI 0x5 → ADDI 0x678),
      rv32i_smoke_32 PASS (38 cycles, exit_code=0), rv32m_basic_32 PASS (228 cycles),
      exception_precise_32 PASS (14 cycles), csr_basic_32 PASS (29 cycles)。
      E1→E1 bypass 验证工作正常 (LUI result=0x5000 通过 bypass 传到 ADDI)。
    regression_test: "tests/directed/rv32i_smoke.S"

  - id: "ERR-025"
    title: "V1 CoreMark 早期 stall 在 BGEU 后 (f2_pc 卡 0x20)"
    description: >
      CoreMark V1 仿真在 boot 阶段 BGEU (PC=0x20) 完成后, fetch 卡在 f2_pc=0x20,
      不前进到 0x24 (sw 0(t0))。200M cycles 内只 retired 11 条指令, magic=0,
      benchmark 结果未写入 0x3FFE0。
      Stall trace 显示: cyc=1016 时已 stall 1000 cycles, f2_pc=0x20, dc_valid=0,
      dc_we=0, dc_ready=1, dc_addr=0x0。没有 SW 操作, fetch 未推进。
      初步分析: e1_mispredict 在 BGEU 完成后持续触发, fetch 进入 ST_FLUSH 后未正确
      退出。但 dc_valid=0 说明根本未到 SW 阶段, fetch 卡死先于 SW。
      可能根因: ERR-020 修复 (E1→M 误预测时保留分支) 引入了新问题, 在
      boot 阶段 fetch 状态机/flush 恢复逻辑异常。
      Smoke 测试 (rv32i_smoke_32, rv32m_basic, exception_precise, csr_basic) 仍 PASS,
      表明基础功能正常, 问题仅限于 benchmark 早期 boot 代码。
    discovered_date: "2026-07-13"
    discovered_by: hw-ver
    affected_modules:
      - "src/rtl/core/lumi_fetch.sv"
      - "src/rtl/core/lumi_execute.sv"
      - "src/rtl/core/lumi_core_top.sv"
      - "src/rtl/core/lumi_decode_issue.sv"
    affected_versions: ["v1"]
    severity: critical
    status: resolved
    workaround: >
      CoreMark V1 完整跑通需进一步诊断 fetch 状态机/E1 mispredict 逻辑。
      临时跳过 CoreMark (使用 CoreMark gem5 数据 6.97 CM/MHz 作为 V1 性能基线)。
      Smoke 测试 (6 项中 4 项 PASS) 可作为 V1 验证基础。
      Dhrystone V1 仍受 ERR-021 影响 (store misalign)。
    resolved_date: "2026-07-13"
    resolved_by: hw-design
    resolution: >
      根本原因: lumi_decode_issue.sv 中 post_flush_block_r (ERR-019 引入) 的清空条件
      `d_pc != batch_pc_r` 在循环结构下死锁。
      触发场景: crt0_v1.S BSS 清零循环 `bgeu; sw; addi; j 1b`:
        - BGEU (0x20) 不 taken, 走 fall-through 到 sw (0x24)
        - sw (0x24) 写入 0(t0)
        - addi (0x28) t0 += 4
        - j 1b (0x2C) 重定向到 0x20 (BGEU)
        - BGEU 又不 taken, 又 fall-through ... 循环
      J 0x2C 的 mispredict 触发 flush, fetch 跳到 0x20 (与旧 batch 同 PC),
      d_pc 重新变成 0x20, 与 batch_pc_r 相同, post_flush_block_r 永远不解除,
      导致 decode stage stall 死锁。
      修复方案: 移除 `d_pc != batch_pc_r` 条件, 改为仅判断 d_valid (F2 在 flush 周期
      已清空 f2_valid_r=0, 新 d_valid=1 必然来自重定向路径, 无需 PC 比较)。
      验证: CoreMark V1 仿真跑 34 分钟 (8s sim timeout 触发), 225,742,390 commit
      无 stall, 0 PC Restarts。test_bgeu_taken 5 commit 全部完成, BGEU 正确 taken
      (0x08→0x1C)。Dhrystone V1 PASS (22 commit, exit_code=0)。
      修改文件: src/rtl/core/lumi_decode_issue.sv (3 处, 移除 d_pc != batch_pc_r 条件)
    regression_test: "tests/directed/test_bgeu_taken_v3.S"

  - id: "ERR-026"
    title: "CoreMark V1 8s simulation timeout 内未达 ECALL exit"
    description: >
      CoreMark V1 仿真在 stall bug (ERR-025) 修复后, 持续 commit 2.25 亿条指令
      (Total Retired=225,742,390), 0 PC Restarts, 无 stall。但 8s simulation timeout
      (8_000_000_000 ns = 400M cycles @ 50MHz) 触发 $finish 时, benchmark 仍未到达
      内部的 ECALL 退出点。
      原因: CoreMark 默认配置 ITERATIONS=50, TOTAL_DATA_SIZE=2000, 完整跑完需要
      超过 400M cycles。当前 V1 TB 的 8s timeout 不足以覆盖完整 benchmark 流程。
