  - id: "ERR-105"
    title: "0x178 PC 非对齐 — pred_branch_slot=0 候选根因"
    description: >
      qa-audit 第2轮逻辑推演发现 predecode.sv (lines 202-205) 在
      pred_branch_slot=0 时的 bytes_consumed 计算可能导致 PC 落在
      指令中间:
      pred_branch_slot=0 + !carry_valid + inst_compressed[0]=0 (32-bit)
      → bytes_consumed = 4
      → pc_next = pc_reg + 4
      若 pc_reg=0x174 且 BTB 误预测 / 冷启动, pc_next = 0x178,
      但 0x178 是 JAL 0x176 的第三字节 (假设 JAL 起始于 0x174)
      或 JAL 0x176 的中间字节 (假设 JAL 起始于 0x176)。
      0x178 非有效指令边界, 触发 illegal instruction 异常。
      需添加 PC 对齐断言验证此假说。SA-CM-LD-002。
      [GLM 第3轮审计修正] 假说被推翻: 当 pred_taken=1 时 FSM 使用
      f1_pred_target_comb 而非 bytes_consumed, bytes_consumed 不影响 pc_next。
      严重度从 critical 降为 low。0x178 根因重新判定为 P0 bug 级联效应 (80%)。
    discovered_date: "2026-07-14"
    discovered_by: qa-audit (logic-deduction audit)
    affected_modules:
      - "src/rtl/core/lumi_predecode.sv"
      - "src/rtl/core/lumi_fetch.sv"
    affected_versions: ["v0.2"]
    severity: low
    status: open
    workaround: "修复 P0 bug (SA-CM-001/002/003) 后验证 0x178 是否消失"
    resolved_date: null
    resolved_by: null
    resolution: null
    regression_test: "tests/directed/pc_alignment_test.S (Phase 0 待创建)"
    related_risks: ["RISK-023"]
    related_errata: ["ERR-042"]
    audit_update: "GLM 第3轮审计推翻假说: 当 pred_taken=1 时 FSM 用 f1_pred_target_comb 不用 bytes_consumed。严重度从 critical 降为 low。0x178 根因重新判定为 P0 bug 级联效应 (80%)。"

