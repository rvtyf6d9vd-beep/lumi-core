  - id: "ERR-044"
    title: "SoC trap 接口硬编码为 0"
    description: >
      在 src/rtl/top/lumi_soc_top.sv 中，trap_valid、trap_cause、trap_pc 等异常
      信号未从 core_top 接入，而是被硬编码为 0。外部调试器与系统监控模块无法
      观测到核内产生的异常、断点与触发事件。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["top/lumi_soc_top"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "在仿真中通过 force 注入内部 trap 信号；在硅片中依赖 JTAG 调试寄存器回读重构异常状态。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/soc_trap_monitor/"

  - id: "ERR-045"
    title: "SoC CLIC CSR 接口未连接"
    description: >
      在 src/rtl/top/lumi_soc_top.sv 中，core_top 暴露的 CLIC CSR 读写接口悬空
      未驱动。mintstatus、mintthresh 及中断使能寄存器等无法通过 SoC 内存映射访问，
      导致 CLIC 初始化与中断优先级编程被阻塞。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["top/lumi_soc_top"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "在 core_top 与 SoC CSR 桥之间手动连线 CLIC CSR 信号；临时通过 JTAG/DMI 后门配置 CLIC。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/clic_csr_access/"

  - id: "ERR-046"
    title: "SoC NMI 信号硬接 0"
    description: >
      在 src/rtl/top/lumi_soc_top.sv 中，NMI 输入被硬编码为 1'b0。看门狗、总线
      错误单元等外部源产生的非屏蔽中断无法送达核内，Smrnmi 恢复流程与关键错误
      处理均无法触发。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["top/lumi_soc_top"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "验证期间 force nmi_in 为期望值；FPGA bring-up 时通过临时跳线引入板级 NMI 源。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/nmi_delivery/"

  - id: "ERR-047"
    title: "E1→M MUL/DIV 旁路时序错误"
    description: >
      在 src/rtl/core/lumi_core_top.sv 中，E2 级 MUL/DIV 结果旁路到 M 级时未补偿
      E1/E2 执行流水之间的 1-cycle latency。M 级相关指令可能消费到陈旧或未写完的
      数据，导致连续 MUL/DIV 指令序列静默数据错误。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_core_top"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "插入显式的一级对齐寄存器或调整旁路选择逻辑，使 M 级消费者使用 E1 结果；软件避免相关 MUL/DIV 指令相邻发射。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/mul_div_bypass/"

  - id: "ERR-048"
    title: "Cache Evict 只发 1 beat"
    description: >
      在 src/rtl/memory/lumi_cache.sv 中，64B cache line 的 evict 路径仅驱动一个
      16B AXI beat 后即结束事务。剩余 48B 脏数据被丢弃，导致写回内存数据不一致并
      引发多主设备间的缓存一致性问题。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["memory/lumi_cache"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "软件中将 cache 配置为 write-through 或禁用脏行；通过 uncached 别名刷新行；避免多路脏行工作负载。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/cache_evict_writeback/"

  - id: "ERR-049"
    title: "CSR 写与 HPM 递增竞争"
    description: >
      在 src/rtl/csr/lumi_csr_unit.sv 中，当 CSR 写 mhpmcounter[n] 与 HPM 自动递增
      发生在同一 cycle 时，递增路径会覆盖显式写入。软件无法可靠初始化或更新性能
      计数器。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["csr/lumi_csr_unit"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "先通过 mcountinhibit 禁止计数，写入目标值后再恢复计数；或重复写入目标值以覆盖竞争。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/csr_hpm_write_race/"

  - id: "ERR-050"
    title: "CDC 同步器短路"
    description: >
      在 src/rtl/bus/lumi_axi_wrapper.sv 中，从 AXI 时钟域进入核时钟域的信号直接
      组合连线，未插入两级触发器同步器。亚稳态可能传播到核内逻辑，在 AXI 时钟异步
      变化时造成功能间歇性失败或挂死。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["bus/lumi_axi_wrapper"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "约束 AXI 与核时钟为同步或相位对齐时钟；验证时仅检查同步器结构假设。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 1"
    regression_test: "tests/directed/cdc_synchronizer/"

  - id: "ERR-051"
    title: "Debug module CDC 单级触发器"
    description: >
      在 src/rtl/debug/lumi_debug_module.sv 中，JTAG TCK 域信号到系统时钟域仅通过
      单级触发器同步。亚稳态稳定时间不足，可能破坏调试控制状态，导致错误的 halt
      或寄存器访问结果。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["debug/lumi_debug_module"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "降低 JTAG TCK 频率以减小亚稳态概率；验证时假设理想同步 TCK。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 2"
    regression_test: "tests/directed/debug_cdc_sync/"

  - id: "ERR-052"
    title: "TCM DMA 地址解码复用 core_addr"
    description: >
      在 src/rtl/memory/lumi_tcm.sv 中，DMA 端口地址解码复用了 CPU 的 core_addr
      信号而非专用 dma_addr。并发 DMA 传输可能别名到 CPU 当前访问区域或与取指/访存
      冲突，导致数据损坏或总线协议违例。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["memory/lumi_tcm"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "确保 CPU 在 DMA 访问 TCM 期间处于 WFI/halted 状态，或将 DMA 访问路由到系统内存。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 2"
    regression_test: "tests/directed/tcm_dma_addr_decode/"

  - id: "ERR-053"
    title: "Regfile 双写端口冲突"
    description: >
      在 src/rtl/csr/lumi_regfile.sv 中，多发射同 rd 时两个写端口同时使能而缺少
      仲裁。最终寄存器值变得不确定，可能随实现或时序变化。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["csr/lumi_regfile"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "编译器/调度器避免同一 cycle 写同一 rd 的指令序列；通过交换发射槽或插入 NOP 规避。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 2"
    regression_test: "tests/directed/regfile_dual_write_conflict/"

  - id: "ERR-054"
    title: "MISA_VAL 不正确"
    description: >
      在 src/rtl/csr/lumi_csr_unit.sv 中，只读 MISA CSR 值未正确反映已实现的扩展
      （例如缺失 F/D/V/B/Zce 位）。操作系统与运行时通过 MISA 选择代码路径时将使用
      错误的功能集。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["csr/lumi_csr_unit"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "在机器模式启动时通过覆盖值修正 MISA；依赖设备树中的静态 ISA 字符串，不使用 cpuid 式 MISA 探测。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 2"
    regression_test: "tests/directed/csr_misa_value/"

  - id: "ERR-055"
    title: "PLIC 多核路由仅 hart0"
    description: >
      在 src/rtl/interrupt/lumi_plic.sv 中，PLIC 中断通知输出仅连接到 hart0。多核或
      多 hart 配置下 hart1..N 无法接收外部中断，破坏对称多处理与监管者中断委托。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["interrupt/lumi_plic"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "将所有外部中断集中到 hart0，再通过软件 IPI 转发给其他 hart；限制 SMP 驱动假设 hart0 为中断汇聚点。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "tests/directed/plic_multi_hart/"

  - id: "ERR-056"
    title: "FENCE 不 drain store buffer"
    description: >
      在 src/rtl/core/lumi_execute.sv 中，FENCE 被解码为单 cycle NOP，未等待 store
      buffer 排空或内存序生效。这违反 RISC-V 内存序保证，可能在多主系统中导致
      数据竞争。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_execute"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "软件插入显式 store-buffer 排空序列（如写已知地址并轮询）；避免依赖 FENCE 的同步模式。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 2"
    regression_test: "tests/directed/fence_store_buffer_drain/"

  - id: "ERR-057"
    title: "Filelist 引用不存在文件"
    description: >
      在 src/rtl/lumi_core.f 中，有 3 个文件路径在仓库中不存在。综合与仿真流程在
      文件解析阶段失败，阻塞发布构建。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["rtl/filelist"]
    affected_versions: ["v0.2"]
    severity: major
    status: resolved
    workaround: "运行构建前在 lumi_core.f 中删除或修正无效路径；为 CI 维护本地补丁文件。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "scripts/synth/synth_lumi.tcl"

  - id: "ERR-058"
    title: "FPU 运算 passthrough"
    description: >
      在 src/rtl/fpu/lumi_fpu.sv 中，F/D 扩展指令被识别后数据通路仅将某个源操作数
      透传至结果，未执行实际运算。算术、比较与转换指令均产生错误值。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["fpu/lumi_fpu"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "在 MISA 中禁用 F/D 扩展，所有软件使用 -march=rv32imac_zicsr 编译；对 FP 指令陷入软件模拟。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "tests/directed/fpu_operation/"

  - id: "ERR-059"
    title: "Vector SIMD 硬编码为加法"
    description: >
      在 src/rtl/fpu/lumi_vector.sv 中，向量运算无论 opcode 或 funct3/funct6 编码
      如何均只实现加法。任何非加法的向量指令都会产生错误结果。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["fpu/lumi_vector"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "禁用向量扩展并在不带 V 的情况下编译；必要时在软件中模拟向量指令。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "tests/directed/vector_simd/"

  - id: "ERR-060"
    title: "Zicbom 解码缺失"
    description: >
      在 src/rtl/core/lumi_decode_issue.sv 中缺少 CBO.CLEAN、CBO.FLUSH、CBO.INVAL
      的解码，这些 Zicbom cache-block 管理指令被当作非法指令处理。使用缓存维护操作
      的软件将触发非法指令异常。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_decode_issue"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "软件中避免 cache-block 管理指令，或通过系统调用/模拟陷入实现。"
    resolved_date: "2026-07-15"
    resolved_by: "rtl-legacy-fix-plan"
    resolution: "CBO.CLEAN/FLUSH/INVAL decoded as NOP in OP_FENCE case (funct3=010), rs1 base address preserved. Regression test: tests/directed/test_zicbom_zicbop_nop.S"
    regression_test: "tests/directed/test_zicbom_zicbop_nop.S"

  - id: "ERR-061"
    title: "Zicbop/Zicboz 解码缺失"
    description: >
      解码器未识别 Zicbop 的 PREFETCH.R/I/W 提示以及 Zicboz 的 CBO.ZERO。PREFETCH
      提示被当作非法指令，CBO.ZERO 产生异常而非清零整个 cache block。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_decode_issue"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "使用不包含 Zicbop/Zicboz 的 -march 编译；用显式零存储替换 CBO.ZERO。"
    resolved_date: "2026-07-15"
    resolved_by: "rtl-legacy-fix-plan"
    resolution: "CBO.ZERO decoded as NOP (funct3=010, rs2=00100). PREFETCH.R/I/W decoded as NOP (funct3=110). Regression test: tests/directed/test_zicbom_zicbop_nop.S"
    regression_test: "tests/directed/test_zicbom_zicbop_nop.S"

  - id: "ERR-062"
    title: "Zicond/Zihintntl 解码缺失"
    description: >
      解码/发射级未实现 Zicond 条件零指令（CZERO.EQZ/CZERO.NEZ）以及 Zihintntl
      的 NTL 提示（NTL.PALL/NTL.S1/NTL.ALL）。使用这些扩展编译的代码会触发非法
      指令异常。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_decode_issue"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "编译时不使用 Zicond/Zihintntl，依赖分支/条件移动序列；忽略 NTL 提示。"
    resolved_date: "2026-07-15"
    resolved_by: "rtl-r2-fix-plan"
    resolution: "Zicond CZERO.EQZ/NEZ now detected via funct7/funct3 in OP_REG/OP_IMM cases, triggers illegal instruction (valid=0). Zihintntl NTL hints treated as NOP."
    regression_test: "tests/directed/test_zicond_illegal.S"

  - id: "ERR-063"
    title: "Zimop/Zcmop/Ziccamoa 编码空间未保留"
    description: >
      未对 Zimop、Zcmop 和 Ziccamoa 的 may-be-op 指令编码空间做显式保留或合法化
      解码。未来扩展使用这些 opcode 时可能与当前解码器行为冲突。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_decode_issue"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "确保编译生成的二进制不使用 Zimop/Zcmop/Ziccamoa opcode，直到相关扩展实现。"
    resolved_date: "2026-07-15"
    resolved_by: "rtl-r2-fix-plan"
    resolution: "Zimop (OP_CUSTOM0=0001011) now treated as NOP per RISC-V specification. Removed from illegal instruction check."
    regression_test: "tests/directed/test_zimop_nop.S"

  - id: "ERR-064"
    title: "Fetch FSM default 分支空操作"
    description: >
      在 src/rtl/core/lumi_fetch.sv 中，取指状态机的 default 分支仅执行空操作，未
      转移到安全状态也未报错。SEU 或时序异常导致的非法状态可能静默卡死取指流水。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["core/lumi_fetch"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "在取指状态转换上增加运行时断言，避免长时间不可中断的取指停顿。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "tests/directed/fetch_fsm_default/"

  - id: "ERR-065"
    title: "DFT MBIST FSM 缺少 default"
    description: >
      在 src/rtl/dft/lumi_dft_ctrl.sv 中，MBIST 控制器状态机的 case 语句无 default
      分支。综合工具可能对不可达状态编码推断出锁存器或非预期行为，安全关键 DFT 逻辑
      也缺乏对 SEU 导致非法状态的恢复能力。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["dft/lumi_dft_ctrl"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "测试期间约束 MBIST FSM 状态输入，并在 MBIST 序列后使用外部复位。"
    resolved_date: "2026-07-14"
    resolved_by: "rtl-bugfix-plan"
    resolution: "Fixed per static scan bug fix plan Phase 3"
    regression_test: "tests/directed/dft_mbist_fsm/"

  - id: "ERR-066"
    title: "Lockstep FSM 缺少 default"
    description: >
      在 src/rtl/multicore/lumi_lockstep.sv 中，lockstep 比较器状态机的 case 语句
      缺少 default 分支。非法状态编码可能使 lockstep 逻辑无响应，掩盖核间差异检测。
    discovered_date: "2026-07-14"
    discovered_by: rtl-static-scan
    affected_modules: ["multicore/lumi_lockstep"]
    affected_versions: ["v0.2"]
    severity: minor
    status: resolved
    workaround: "在出现任何异常状态后将 lockstep 逻辑保持复位，并依赖外部看门狗保证安全完整性。"
    resolved_date: "2026-07-14"
