      `div_dividend[31] ^ div_divisor[31]` 判断余数符号, 但这两个寄存器
      已被取绝对值。RISC-V 规定余数符号与被除数相同, 而非 XOR。
      当被除数为正、除数为负时 (如 7 % -2), 余数错误取负。
