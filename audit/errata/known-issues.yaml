  - id: "ERR-019"
    title: "V1 分支预测系统多 bug — BTB is_branch 硬编码 + e1_mispredict + JAL spin"
    description: >
      V1 分支预测子系统存在 7 个独立 bug, 导致所有 taken 分支和 JAL 指令产生
      pipeline flush 死循环, CoreMark/Dhrystone 等基准测试无法完成:
      (1) pc_reg 在 branch_redirect 时未同步更新, redirect 后取指地址错误;
      (2) V1 SRAM ICache 地址 addr[5:4] 被丢弃, PC=0x14 返回 PC=0x10 的指令;
      (3) BTB 更新使用 branch target 而非 branch PC, BTB 学到错误地址;
      (4) e1_mispredict 对所有 taken 分支触发 (缺少预测状态跟踪), 正确预测也 flush;
      (5) F2 预测使用寄存器版本 (跨周期), V1 组合 ICache 应使用 comb 版本;
      (6) BTB is_branch 硬编码=1, JAL/JALR 被当作条件分支, LTAGE 初始预测
          not-taken, 导致 JAL 永远误预测;
      (7) decode_issue.sv issued_mask 在同 PC 重复取指时不重置, 自循环 JAL
          spin loop 无法持续发射。
    discovered_date: "2026-07-11"
    discovered_by: hw-ver
    affected_modules:
      - "src/rtl/core/lumi_fetch.sv"
      - "src/rtl/core/lumi_execute.sv"
      - "src/rtl/core/lumi_core_top.sv"
      - "src/rtl/core/lumi_decode_issue.sv"
      - "src/rtl/top/lumi_soc_top.sv"
    affected_versions: ["v1"]
    severity: critical
    status: resolved
    workaround: >
      test_bgeu_taken_v3 使用 spin loop (j correct_spin) 验证分支预测修复。
      V1 基准测试使用专用 port (crt0_v1.S + v1_lib.c + lumi-v1-bench.ld)。
    resolved_date: "2026-07-11"
    resolved_by: hw-design
    resolution: >
      (1) fetch.sv: branch_redirect 时 pc_reg 同步更新;
      (2) soc_top.sv: V1 SRAM 地址对齐修正 (保留完整地址位);
      (3) core_top.sv: tage_update_pc 改用 e1_branch_pc (分支指令自身 PC);
      (4) execute.sv + fetch.sv: 添加预测状态跟踪 (pred_taken/pred_target 传递),
          e1_mispredict 仅在预测与实际不一致时触发;
      (5) fetch.sv: F2 预测改用 f1_pred_taken_comb (组合逻辑版本);
      (6) execute.sv: 添加 e1_br_is_jal/e1_br_is_jalr 输出端口,
          fetch.sv: BTB 写入根据分支类型设置 is_branch (JAL/JALR=0, 条件=1);
      (7) decode_issue.sv: 添加 all_valid_issued 检查, 批次全部消费后清除 mask。
      验证: test_bgeu_taken_v3 PASS (31 cycles), CoreMark 33M insts IPC=0.67,
      Dhrystone 49M insts IPC=0.98 (50M cycles 超时但执行正常)。
    regression_test: "tests/directed/test_bgeu_taken_v3.S"

  - id: "ERR-020"
    title: "V1 E1→M 流水线误预测时丢失分支指令 (JAL 不写 ra)"
    description: >
      V1 流水线在分支误预测时, E1→M 寄存器块不做任何操作 (保留 M 旧值),
      但 E1 同时被 flush (e1_valid_r=0)。分支指令 (如 JAL) 在 E1 中
      计算完成后, 因 e1_mispredict=1 无法被 M 捕获, 在下一周期 E1 flush
      后丢失。分支永远不到 W 级, rd (如 ra) 永远不写, 导致 ret 读取 ra=0,
      程序反复重启 (PC Restarts > 0)。
      此 bug 是 ERR-019 修复后 CoreMark/Dhrystone 仍无法完成的根因。
    discovered_date: "2026-07-11"
    discovered_by: hw-design
    affected_modules:
      - "src/rtl/core/lumi_core_top.sv"
      - "src/rtl/core/lumi_bypass.sv"
    affected_versions: ["v1"]
    severity: critical
    status: resolved
    workaround: >
      修复前 CoreMark 在 50M cycles 内 5 次 PC restart, 程序在 boot 代码中循环。
    resolved_date: "2026-07-11"
    resolved_by: hw-design
    resolution: >
      1) E1→M 寄存器: 误预测时从 E1 组合输出捕获分支指令到 M 级,
         仅保留最早误预测 slot (分支自身), 杀死之后的推测指令;
      2) Bypass M 级源: 从 memory_stage 的 m_pipe_* (比 M 延迟 1 周期)
         改为直接使用 E1→M 寄存器 (m_result_r/m_rd_r/m_valid_r),
         减少 1 周期 bypass 延迟;
      3) 移除 m_has_branch_rd_write HOLD 和额外气泡 (过度保守,
         导致每个分支写 rd 都产生额外 stall, 严重降低 IPC)。
      验证: ECALL PASS, CoreMark V1 PASS (exit_code=0, 0 restarts, 68 cycles)。
      Dhrystone 仍有 store misalign 异常 (ERR-021, 独立问题)。
    regression_test: "perf/benchmarks/coremark-v1/coremark-v1_32.hex"

  - id: "ERR-021"
    title: "Dhrystone V1 store 地址未对齐异常 (cause=6) + trap→restart"
    description: >
      Dhrystone V1 仿真在 PC=0x474-0x47c 处触发 Store/AMO address misaligned
