# ════════════════════════════════════════════════
# 第 3 部分: CLIC 接线架构
# ════════════════════════════════════════════════
clic_wiring:
  python_level:
    script: lumi-interrupt-fs.py
    flow:
      - "system.clic = CLIC(num_interrupts=16)"
      - "m5.instantiate()"
      - "wire_clic_post_instantiate(system)"
      - "  tc = system.cpu.getThreadContext(0)"
      - "  isa = tc.getIsaPtr()"
      - "  interrupts = isa.getInterrupts(tc)"
      - "  interrupts.setCLIC(system.clic)"

  cpp_level:
    interrupt_routing:
      - "PLIC MEIP output -> CLIC interrupt ID 0"
      - "CLIC arbitrate() -> highest priority pending"
      - "InterruptFault(INT_LOCAL_0 + clic_id)"

  test_binaries:
    - path: perf/gem5-model/tests/interrupt/test_pmp.riscv
      description: "PMP 区域访问违规测试"
    - path: perf/gem5-model/tests/interrupt/test_clic.riscv
      description: "CLIC 优先级/嵌套/向量化测试"
    - path: perf/gem5-model/tests/interrupt/test_plic.riscv
      description: "PLIC 中断源/优先级/路由测试"
    - path: perf/gem5-model/tests/interrupt/test_smrnmi.riscv
      description: "Smrnmi NMI 投递测试"

