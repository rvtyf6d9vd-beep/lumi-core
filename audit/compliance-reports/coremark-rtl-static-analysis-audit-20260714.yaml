additional_measures:
  - measure: "fetch PC 对齐断言"
    implementation: >
      在 lumi_fetch.sv 的 always_comb FSM 末尾增加:
      `assert(pc_next[0] == 1'b0)` 和 `assert(f1_pc_out[0] == 1'b0)`
    purpose: "第一时间捕获 PC 非对齐"

  - measure: "分支目标地址断言"
    implementation: >
      在 lumi_execute.sv 的 branch_target 计算后增加:
      `assert(branch_target[i][0] == 1'b0)`
    purpose: "确保 JAL/JALR/BRANCH 目标 2-byte 对齐"

  - measure: "JAL 返回/前跳最小复现"
    implementation: >
      编写 directed test: 0x176 处 JAL 到子程序, 子程序 RET,
      验证返回地址正确。
    purpose: "复现 ERR-042 场景"

  - measure: "ISS 参考模型对比"
    implementation: >
      在 Scoreboard 中集成 Spike 或 riscv-isa-sim,
      每周期对比寄存器文件。
    purpose: "快速定位第一条错误指令"

  - measure: "TB 超时修复"
    implementation: >
      修复 cycle_count 递增逻辑, 增加 PROGRESS 停滞检测。
    purpose: "避免无效长仿真"

