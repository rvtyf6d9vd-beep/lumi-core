fix_order:
  - phase: "Phase 0 — 根因定位 (blocker)"
    issues: ["SA-CM-AUDIT-001"]
    rationale: >
      当前 CoreMark 无法完成的直接原因是 fetch PC 非对齐 (ERR-042/RISK-023)。
      不定位并修复此问题, 其他修复无法有效验证。
      交付物: 最小复现用例、PC 对齐断言、导致 0x178 的具体分支定位。

  - phase: "Phase 1 — 立即修复 (P0)"
    issues: ["SA-CM-001", "SA-CM-002", "SA-CM-003", "SA-CM-004", "SA-CM-AUDIT-003"]
    rationale: >
      这四个问题直接影响 CoreMark 计算正确性:
      DIVU/REMU 符号错误 (SA-CM-001) 影响无符号除法;
      DIV 余数符号错误 (SA-CM-002) 影响所有有符号 REM;
      MUL 单槽限制 (SA-CM-003) 导致乘法结果丢失;
      LTAGE 历史污染 (SA-CM-004) 影响分支预测准确率。
      SA-CM-001 和 SA-CM-002 需同时修复, 否则交互导致无符号高地址值错误。

  - phase: "Phase 2 — 尽快修复 (P1)"
    issues: ["SA-CM-AUDIT-002", "SA-CM-005", "SA-CM-007", "SA-CM-012"]
    rationale: >
      TB 超时失效 (SA-CM-AUDIT-002) 是调试基础设施问题;
      BTB Group Lookup (SA-CM-005) 和 FSM 优先级 (SA-CM-007)
      是 fetch 控制隐患, 可能与 PC 非对齐相关;
      Scoreboard ISS 集成 (SA-CM-012) 提升调试效率。

  - phase: "Phase 3 — 计划修复 (P2)"
