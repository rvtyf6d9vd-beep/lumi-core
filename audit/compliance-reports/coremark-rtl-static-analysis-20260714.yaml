    description: >
      历史记录 (ERR-042, RISK-023) 显示 CoreMark V1 Phase A 仿真中
      PC 在 0x178 处反复跳回 0x0, 0x178 是 JAL 0x176 的中间字节,
      非有效指令边界。原静态分析报告未直接识别此根因。
      可能诱因: BTB Group Lookup 禁用 (SA-CM-005) 导致 JAL 0x176
      不被预测, 误预测 flush 后重定向 PC 计算错误; 或 predecode
      bytes_consumed 与 pc_next 不一致; 或 RAS 返回地址未对齐。
    impact: >
      这是当前 CoreMark V1 无法完成的直接原因, 优先级应高于所有其他问题。
      不定位并修复此根因, 其他修复无法有效验证。
    fix: >
      (1) 在 fetch.sv 增加 PC 对齐断言: `assert(pc_next[0] == 1'b0)`;
      (2) 对 JAL/JALR/BRANCH 目标增加 2-byte 对齐强制;
      (3) 通过 trace 定位第一次 0x178 出现前最后一条分支指令;
      (4) 建立最小复现用例: JAL 0x176 → 子程序 → RET。
    priority: P0-首项
    related_errata: ["ERR-042"]
    related_risks: ["RISK-023"]

  - id: "SA-CM-AUDIT-002"
    title: "TB 2B cycles 超时机制失效 (ERR-043)"
    severity: high
    category: 验证环境
    module: "src/tb/top/lumi_v1_tb_top.sv"
    lines: "433-440"
    description: >
      ERR-043 记录 V1 TB 的 `cycle_count > 2_000_000_000` 超时条件
      在 CoreMark 仿真中未触发, 仿真运行到 2.2B+ cycles 仍在继续。
      可能原因: cycle_count 递增逻辑或 while 循环条件在 --timing 模式下
      调度异常。
    impact: >
      调试效率严重下降, CoreMark 卡死时无法及时终止, 浪费仿真资源。
    fix: >
      检查 `cycle_count` 递增逻辑; 增加 PROGRESS 停滞检测
      (10M cycles 无进展则结束); 使用 Verilator 强制 timeout。
    priority: P1
    related_errata: ["ERR-043"]

  - id: "SA-CM-AUDIT-003"
    title: "SA-CM-001 与 SA-CM-002 交互 — 无符号高地址值被错误取负"
    severity: critical
    category: 执行单元
    module: "src/rtl/core/lumi_execute.sv"
    lines: "260-313"
    description: >
      SA-CM-001 使 DIVU/REMU 的 div_signed=1, 导致进入 SA-CM-002 的
      有符号结果修正路径。此时 div_dividend/div_divisor 保存原始
      无符号值 (未取绝对值)。若被除数 >= 0x80000000,
      `div_dividend[31]=1`, 触发结果取负, 无符号除法结果错误。
    impact: >
      即使 CoreMark 不直接使用 DIVU/REMU, 若编译器生成且操作数
      高位为 1 (如地址运算), 结果必然错误。
    fix: >
      同时修复 SA-CM-001 (div_signed 正确) 和 SA-CM-002 (结果符号分别处理)。
    priority: P0

