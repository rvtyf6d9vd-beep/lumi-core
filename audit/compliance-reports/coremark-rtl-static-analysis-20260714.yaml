  - id: "SA-CM-001"
    title: "DIVU/REMU 有符号判断逻辑错误 — 无符号除法被当作有符号处理"
    severity: critical
    category: 执行单元
    module: "src/rtl/core/lumi_execute.sv"
    lines: "260-261"
    description: >
      div_signed 计算公式为 `funct3[0] ^ (funct3 == MUL_DIV || funct3 == MUL_REM)`。
      对于 DIVU (funct3=3'b101): funct3[0]=1, 条件=false, 结果=1^0=1 (有符号)。
      对于 REMU (funct3=3'b111): funct3[0]=1, 条件=false, 结果=1^0=1 (有符号)。
      但 DIVU/REMU 应为无符号操作 (div_signed=0)。
      正确公式应为 `(funct3 == MUL_DIV || funct3 == MUL_REM)` 或 `~funct3[0]`。
    impact: >
      DIVU/REMU 指令会对操作数取绝对值 (误判为负数时取反),
      并在结果恢复阶段错误地应用符号修正。CoreMark 中若使用无符号除法,
      结果将完全错误。
    fix: >
      将 line 260-261 改为:
      `div_signed <= (e1_inst[i].funct3 == MUL_DIV || e1_inst[i].funct3 == MUL_REM);`
    priority: P0

  - id: "SA-CM-002"
    title: "DIV 余数符号计算错误 — 被除数为正、除数为负时余数符号翻转"
    severity: critical
    category: 执行单元
    module: "src/rtl/core/lumi_execute.sv"
    lines: "307-313"
    description: >
      DIV_DONE 状态中使用 `div_dividend[31] ^ div_divisor[31]` 判断结果符号。
      但 div_dividend 和 div_divisor 在 DIV_IDLE 阶段已被取绝对值,
      所以它们的 bit[31] 应为 0 (除非溢出: -INT_MIN)。
      实际效果: 当原始被除数为负且除数为正时 (如 -7/2), 符号判断为 1^0=1,
      余数取负 → -1 ✓; 但当被除数为正且除数为负时 (如 7/-2),
      符号判断为 0^1=1, 余数取负 → -1 ✗ (应为 1)。
      RISC-V 规定余数符号与被除数相同, 而非 XOR。
    impact: >
      复核修正: 该 bug 影响范围比初判更大。
      div_dividend/div_divisor 在 DIV_IDLE 阶段已被取绝对值,
      因此 DIV_DONE 中 `div_dividend[31] ^ div_divisor[31]` 几乎恒为 0,
      导致所有异号有符号 DIV 的商和余数均未被取负。
      即使同号 (如 -7/-2), 余数也应与原始被除数同号 (-1), 但代码得到 +1。
      结论: 影响所有有符号 REM 和异号有符号 DIV。
      CoreMark 中的取模/循环计数/数组索引广泛使用 REM, 一旦错误会导致
      数据访问越界或算法结果错误。
    fix: >
      分别处理商和余数的符号:
      商符号: `original_dividend_sign ^ original_divisor_sign`
      余数符号: `original_dividend_sign`
      需要保存原始符号位 (在取绝对值之前)。
    priority: P0
    audit_note: "影响范围经独立审计扩展, 见 coremark-rtl-static-analysis-audit-20260714.yaml"

  - id: "SA-CM-003"
    title: "MUL 单槽限制未在发射端强制执行 — 同批次两条 MUL 指令结果丢失"
    severity: critical
    category: 指令分发
    module: "src/rtl/core/lumi_decode_issue.sv + src/rtl/core/lumi_execute.sv"
    lines: "decode: 539-541; execute: 174-211"
    description: >
      execute 模块中 MUL 单元 (always_comb, lines 182-211) 使用 for 循环
      查找第一条 FU_MUL 指令并计算结果, 后续 MUL 指令被忽略。
      但 decode_issue 中 fu_busy[FU_MUL] 始终为 0 (core_top.sv line 216-219
      仅连接 mem_busy 到 bit[3]), 未连接 MUL FU busy 信号。
      因此同一批次中可以发射两条 MUL 指令, 第二条结果丢失。
    impact: >
      CoreMark 大量使用 MUL 指令 (矩阵乘法、CRC 等), 若同一 fetch batch
      中包含两条 MUL 指令, 第二条的结果不会写入寄存器, 导致后续计算全部错误。
    fix: >
      方案1: 在 decode_issue 中增加同批次 MUL 互斥检测
      (类似 branch 的 stop_issue 机制)。
      方案2: 在 core_top.sv 中将 MUL E2 busy 信号连接到 fu_busy[FU_MUL]。
      方案3: 在 execute 中为每条 MUL 指令分配独立乘法器 (面积代价大)。
    priority: P0

  - id: "SA-CM-004"
    title: "LTAGE 分支历史双移位 — 推测值污染实际历史"
    severity: critical
    category: 分支预测
    module: "src/rtl/core/lumi_fetch.sv"
    lines: "517-556"
    description: >
      当 tage_update_valid 为 true 时, line 519 移入实际结果。
      当 tage_update_valid 为 false 时 (else 分支, lines 552-556),
      若当前周期有 BTB 命中且预测 taken, 历史也移入 bit=1。
      这导致: (1) 实际分支结果和推测预测值可能同时移入 (两周期内),
      历史长度被错误拉伸; (2) 推测值始终为 1 (taken), 即使实际结果
      可能为 not-taken, 历史被污染。
    impact: >
      CoreMark 有大量条件分支, LTAGE 历史污染导致预测准确率下降,
      误预测频繁触发 2-cycle flush, 严重降低性能, 并增加时序敏感
      路径上的冒险窗口。
    fix: >
      移除 else 分支中的历史移位逻辑 (lines 552-556)。
      分支历史应仅由 execute 级的实际分支结果更新。
    priority: P0

