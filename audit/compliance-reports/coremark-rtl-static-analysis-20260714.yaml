  - id: "SA-CM-005"
    title: "BTB Group Lookup 已禁用 — 非 fetch group 起点的分支无法预测"
    severity: high
    category: 分支预测
    module: "src/rtl/core/lumi_fetch.sv"
    lines: "309-398"
    description: >
      ERR-GRP-FIX 显式禁用了 group-level BTB 查找 (lines 390-397)。
      仅保留 slot-0 BTB 查找 (pc_reg 处)。当分支指令不在 fetch group
      起始位置 (PC[3:0] != 0) 时, BTB 永远 miss, 分支不被预测。
      CoreMark 使用 RV32C 压缩指令, 分支可在任意 2-byte 边界,
      大量分支不在 16-byte 对齐的 fetch group 起点。
    impact: >
      非起点分支每次执行都触发误预测 (2-cycle flush), 严重降低 IPC。
      更重要的是: 每次 CALL/RET 都有误预测惩罚, RAS 只能通过
      execute 级反馈更新, 预测路径上的 RAS push/pop 失效。
    fix: >
      重新启用 group-level BTB 查找, 但需修复 carry fetch 导致的
      PC 跳过问题 (ERR-GRP-FIX 注释中提到的原因)。可考虑:
      (1) 在 predecode 阶段做 BTB 多位置查找;
      (2) 使用 PC[3:1] 而非 PC[3:0] 作为 group 索引;
      (3) 为每个 2-byte 位置维护独立 BTB 条目。
    priority: P1

  - id: "SA-CM-006"
    title: "LSU 端口分配使用地址 0 判断空闲 — 地址 0 冲突"
    severity: high
    category: 内存管理
    module: "src/rtl/core/lumi_execute.sv"
    lines: "731-754"
    description: >
      LSU 端口分配逻辑 (line 743): `if (e1_mem_addr[0] == 32'h0)`
      使用地址值 0 判断端口是否空闲。但地址 0x0 是有效地址
      (V1 SRAM 起始地址为 0x0)。若同批次中第一条 MEM 指令访问
      地址 0x0, 第二条 MEM 指令会误判端口 0 空闲, 覆盖第一条数据。
    impact: >
      地址 0x0 附近的内存访问 (如向量表、启动代码) 可能被覆盖。
      虽然概率较低, 但属于正确性缺陷。CoreMark 不太可能访问 0x0,
      但需修复以确保鲁棒性。
    fix: >
      使用独立 occupied 标志:
      `logic lsu0_occupied;`
      在循环中: `if (!lsu0_occupied)` 分配端口 0, 置 `lsu0_occupied = 1`。
    priority: P1

  - id: "SA-CM-007"
    title: "Fetch FSM 覆盖逻辑 — branch_redirect 优先级高于 trap"
    severity: high
    category: 取指控制
    module: "src/rtl/core/lumi_fetch.sv"
    lines: "750-755"
    description: >
      FSM 覆盖块在 case 语句之后执行, 无条件覆盖 pc_next。
      当 trap_redirect_valid 和 branch_redirect_valid 同时为 true 时,
      case 语句先处理 trap (line 655-659), 设置 pc_next = trap_redirect_pc,
      但覆盖块 (line 750-755) 将 pc_next 改为 branch_redirect_pc。
      导致 branch redirect 优先级高于 trap, 违反 RISC-V 异常优先级。
    impact: >
      当 ECALL/EBREAK 和误预测同周期发生时, CPU 可能跳转到
      branch_redirect_pc 而非 mtvec, 跳过异常处理。
      CoreMark 末尾的 ECALL 退出可能与残留分支误预测冲突。
    fix: >
      在覆盖块中增加 trap 优先级检查:
      `if (branch_redirect_valid && !trap_redirect_valid && state_reg != ST_FLUSH)`
    priority: P1

