  - id: "SA-CM-010"
    title: "DIV 除零未显式处理 — 依赖算法副作用"
    severity: medium
    category: 执行单元
    module: "src/rtl/core/lumi_execute.sv"
    lines: "255-322"
    description: >
      RISC-V 规定除零不触发异常: DIV 结果=-1, DIVU 结果=0xFFFFFFFF,
      REM 结果=被除数, REMU 结果=被除数。当前恢复除法算法在除数为 0 时,
      每次减法结果为正 (减0), 商全1 (0xFFFFFFFF), 余数=被除数。
      这恰好匹配 RISC-V 规范, 但属于巧合而非显式设计。
    impact: >
      当前功能正确 (算法副作用恰好正确), 但若修改除法算法,
      可能破坏除零行为。建议显式处理。
    fix: >
      在 DIV_IDLE 状态中检查除数为 0:
      `if (div_divisor == 32'h0) begin div_result_r <= div_is_rem ? div_dividend : 32'hFFFFFFFF; div_valid_r <= 1; div_busy_r <= 0; div_state_reg <= DIV_IDLE; end`
    priority: P2

  - id: "SA-CM-011"
    title: "Scoreboard 无 tohost 检测 — CoreMark 标准退出机制缺失"
    severity: medium
    category: 验证环境
    module: "src/tb/env/lumi_scoreboard.sv"
    lines: "82-123"
    description: >
      Scoreboard 仅检测 ECALL (opcode 0x73, funct12=0) 和 JAL spin loop。
      CoreMark 标准退出通常通过 tohost 机制 (memory-mapped 写入) 或
      ECALL 实现。若 CoreMark 使用 tohost 而非 ECALL, 测试将超时。
      V1 TB (line 476-503) 在测试结束后检查 0x3FFE0 的 benchmark 结果,
      但这依赖测试正常结束。
    impact: >
      若 CoreMark 退出方式与当前检测不匹配, 测试超时,
      无法区分是 RTL bug 还是退出机制不匹配。
    fix: >
      在 Scoreboard 中增加 tohost 检测:
      监控 commit_valid 的 store 操作, 若写入 tohost 地址
      (需从链接脚本获取), 则触发 test_done。
      或在 V1 SRAM 中监控 tohost 地址的写入。
    priority: P2

