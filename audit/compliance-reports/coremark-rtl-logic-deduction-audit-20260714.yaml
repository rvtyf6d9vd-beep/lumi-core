newly_discovered_bugs:

  - id: "SA-CM-LD-001"
    title: "W 阶段 E2 抢占槽 1 — 槽 1 写回被丢失"
    severity: high
    category: 写回阶段
    module: "src/rtl/core/lumi_writeback.sv"
    lines: "140-155"
    description: >
      W 端口 1 的优先级逻辑:
      line 141-145: 若 e2_mul_valid || e2_div_valid, 端口 1 写 e2 结果
      line 146-155: 否则若 w_valid[1], 端口 1 写 w_result[1]
      问题: 当 E2 MUL/DIV 有效时, 槽 1 的写回被完全丢弃。
    scenario_trace:
      - "Cycle N: MUL 1 在 E1, MUL 2 在 D/I (同一 batch 但 slot 不同)"
      - "Cycle N+1: MUL 1 在 E2 (e2_mul_valid=1), MUL 2 在 E1, 槽 1 可能是另一条 ALU 指令"
      - "W 阶段: 槽 1 (ALU) 的写回被 MUL 1 的 E2 抢占"
    impact: >
      在 MUL 之后紧跟 ALU 指令的常见场景下, ALU 的写回会丢失。
    coremark_relevance: >
      CoreMark 的 MUL 后通常跟 ADD/LW 指令, 概率高。
    confidence: "90% — 需验证 MUL 单槽限制修复后此 bug 是否仍然存在"
    priority: P1
    recommendation: "需重新审视写回策略, 建议: MUL/DIV 也通过 W 端口写回, 而非 E2 直写"

  - id: "SA-CM-LD-002"
    title: "pred_branch_slot=0 时 bytes_consumed=4 — 0x178 PC 非对齐的根因候选"
    severity: critical
    category: 取指控制
    module: "src/rtl/core/lumi_predecode.sv"
    lines: "202-205"
    description: >
      predecode 当 pred_taken 且 pred_branch_slot==0:
      - 若 carry_valid: bytes_consumed = 16 - start_offset
      - 若 !carry_valid: bytes_consumed = inst_compressed[0] ? 2 : 4
      关键场景: pc_reg = 0x174, pred_branch_slot = 0, inst_compressed[0] = 0 (32-bit JAL)
      → bytes_consumed = 4 → pc_next = 0x174 + 4 = 0x178
      但 0x178 是 JAL (0x174) 的第三字节! JAL 跨越 0x174-0x177。
    scenario_trace:
      - "pc_reg = 0x174 (4-byte aligned)"
      - "BTB 预测 0x174 是分支, pred_taken=1, pred_branch_slot=0"
      - "predecode 处理第一条 32-bit JAL, bytes_consumed = 4 (因为 inst_compressed[0]=0)"
      - "pc_next = 0x174 + 4 = 0x178"
      - "但 0x178 是 JAL 的第三字节, 不是有效指令边界"
      - "如果 BTB 误预测 (或没有跳转) → pc_reg 直接变成 0x178 → fetch 从 0x178 开始"
    impact: >
      0x178 非对齐 PC 的根因候选。
      pred_branch_slot=0 的预测错误会直接导致 PC 落在指令中间。
    confidence: "70% — 需波形验证 BTB 预测和 pred_branch_slot 的实际行为"
    priority: P0-根因候选
    recommendation: "立即添加 PC 对齐断言, 验证此假说"
    test_to_create: "directed: JAL at 0x174 with BTB mispredict, expect PC=0x174→target (not 0x178)"

# ============================================================
# 0x178 根因分析 (深推演)
# ============================================================

misalign_0x178_analysis:
  symptom: >
    CoreMark V1 Phase A 仿真中 PC 在 0x178 处反复跳回 0x0 (trap handler)。
    0x178 是 JAL 0x176 的中间字节, 非有效指令边界。
  candidates:
    - candidate: "pred_branch_slot=0 误预测 + bytes_consumed=4"
      confidence: 70%
      mechanism: >
        pc_reg=0x174, BTB 预测 0x174 是分支 (但实际不是, 或 BTB miss),
        pred_taken=1, pred_branch_slot=0。
        predecode 处理第一条 32-bit 指令, bytes_consumed=4, pc_next=0x178。
        如果 BTB 实际是冷启动 (BTB miss), pred_taken=0, 则不会用
        f1_pred_target_comb, 改用 pc_reg+bytes_consumed=0x178。
        但 BTB miss 时 f1_pred_taken_comb 应该是 0, 所以 pc_next
        应该用 bytes_consumed 路径, 得到 0x178。
      fix: >
        pred_branch_slot=0 + !pred_taken 时的 bytes_consumed 应该是
        第一个真实指令的长度 (inst_valid[0] ? inst_compressed[0] ? 2 : 4 : 0)
        而不是直接用 inst_compressed 简化判断。
        或者强制 pc_next 必须对齐到 2-byte 边界。

    - candidate: "predecode 误识别 0x176 为 16-bit"
      confidence: 30%
      mechanism: >
        如果 ICACHE 返回的数据在 0x176 处的高 2 位 (low 2 bits of byte 0x176)
        被错误修改 (e.g., 内存写入覆盖), predecode 会把 JAL 误认为 16-bit,
        推进 2 字节, pc_next = 0x178。
      fix: "添加 ICACHE 数据奇偶校验或完整性检查"

    - candidate: "carry 机制错误"
      confidence: 20%
      mechanism: >
        上一 block 的 carry_hw 错误地携带了非指令数据,
        导致本 block 的 predecode 误识别。
      fix: "carry 寄存器增加 data integrity 标记"

  recommended_debug_path:
    - step: 1
      action: "添加 PC 对齐断言到 lumi_fetch.sv line 685 附近"
      assertion: "assert(pc_next[0] == 1'b0) else $error("PC not 2-byte aligned: 0x%08h", pc_next);"
    - step: 2
      action: "添加 bytes_consumed 断言到 predecode 输出"
      assertion: "assert(bytes_consumed inside {0, 2, 4, 6, 8, 10, 12, 14, 16})"
    - step: 3
      action: "添加 f2_data 与 f2_pc 的对齐检查"
      assertion: "assert(f2_pc_r[0] == 1'b0) // 2-byte aligned"
    - step: 4
      action: "建立最小复现用例"
      test: "JAL at 0x176 → ret addr 0x17A; run 1000 cycles; check no PC=0x178"

