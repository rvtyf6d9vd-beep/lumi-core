# ============================================================
# P0 关键 bug 逻辑推演 (深化)
# ============================================================

critical_logic_deduction:

  - id: "SA-CM-001 (深化)"
    title: "DIVU/REMU 有符号判断 XOR 错误"
    scenario_trace:
      - "指令: DIVU x5, x6, x7 (funct3=101, opcode=0x33)"
      - "line 260: div_signed <= 1 ^ 0 = 1 (有符号) ✗ 应为 0"
      - "line 267 条件不满足, div_dividend/div_divisor 保持原始无符号值"
      - "DIV_RUNNING: 32 cycle 恢复除法, 输出 quotient/remainder"
      - "DIV_DONE line 309: div_signed=1, div_dividend[31] 可能为 1 (无符号高地址值)"
      - "若 div_dividend[31]=1: 触发取负, quotient 被错误取反"
    bug_impact: >
      任何被除数 >= 0x80000000 的 DIVU 都得到错误结果。
      在 32 位地址空间, 这覆盖了所有高 16 MiB 地址。
    coremark_relevance: >
      CoreMark 的指针运算和循环计数器可能涉及高地址值。
    confidence: "100% — 逻辑推演无歧义"

  - id: "SA-CM-002 (深化)"
    title: "DIV 余数符号计算错误 — 影响所有有符号 REM"
    scenario_trace:
      - "指令: REM x5, x6, x7 (funct3=110, 有符号)"
      - "line 260: div_signed = 0 ^ 1 = 1 ✓"
      - "line 267: 满足条件, div_dividend = |x6|, div_divisor = |x7| (已取绝对值)"
      - "DIV_DONE line 309: div_signed=1, 但 div_dividend[31]=0 (绝对值), div_divisor[31]=0 (绝对值)"
      - "XOR=0, 永远不进 if 分支, 永远不取负"
      - "结果: 商和余数都是正数, 即使原始操作数是负数"
    bug_impact: >
      所有有符号 REM 都得到错误符号 (应为负的余数变成正)。
      所有异号有符号 DIV 的商也不被取负。
      RISC-V 规范: 商符号 = 被除数 XOR 除数, 余数符号 = 被除数。
    coremark_relevance: >
      CoreMark 中的取模操作 (数组索引、循环边界、CRC 校验) 广泛使用。
    confidence: "100% — 逻辑推演无歧义"
    severity_change: "影响范围从初判的"特定场景"扩大到"所有有符号 REM""

  - id: "SA-CM-003 (深化)"
    title: "MUL 单槽限制未在发射端强制 — 第二条 MUL 写错结果"
    scenario_trace:
      - "Cycle N: 同批次发射两条 MUL (slot 0: MUL x3, x1, x2; slot 1: MUL x4, x5, x6)"
      - "execute line 182-211: for 循环只设置 mul_active=1 和 mul_rd_comb=x3 (第一条 MUL 的 rd)"
      - "mul_full 计算的是第一条 MUL 的结果, 第二条 MUL 的结果被丢弃"
      - "E1 line 675: e1_result[1] = 0 (第二条 MUL 的 E1 占位)"
      - "E2 register: e2_mul_result_r = 第一条 MUL 的结果, e2_mul_rd_r = x3"
      - "E1→M 寄存器 (line 666-667) 对两条 MUL 都用 e2_mul_result 替换 m_result_r"
      - "M 阶段: 两条 MUL 的 m_result_r 都是第一条 MUL 的结果"
      - "W 阶段: 两条 MUL 都写第一条 MUL 的结果, 但 m_rd 不同 (x3 vs x4)"
      - "最终: x4 = 第一条 MUL 的结果, x3 = 第一条 MUL 的结果 (正确)"
    bug_impact: >
      当同批次有两条 MUL 时, 第二条 MUL 的 rd 被写入第一条 MUL 的结果。
      这不是简单的"结果丢失", 而是"结果串改"。
    coremark_relevance: >
      CoreMark 矩阵乘法和 CRC 包含大量 MUL。两条 MUL 同批次的概率
      在 6-wide fetch + 3-wide issue 下约为 10-20%。
    confidence: "100% — 逻辑推演无歧义"
    severity_change: "从"可能结果丢失"升级为"确定结果串改""

  - id: "SA-CM-004 (深化)"
    title: "LTAGE 历史被推测值污染 — 分支历史不准确"
    scenario_trace:
      - "Cycle N: F1 预测 taken (BTB 命中), 移入 1'b1 到 branch_history"
      - "Cycle N+1: 分支在 E1 实际执行, 实际结果可能 not-taken"
      - "tage_update_valid 触发 (cycle N+2): 用实际结果移入 branch_history"
      - "但 cycle N 已经移入了 1'b1 (推测值), cycle N+2 又移入实际值"
      - "实际只移入 1 次 (实际值), 但 cycle N 的移入是无效的"
    bug_impact: >
      branch_history 实际只反映实际分支结果 (因为 actual 在 update 时覆盖),
      但移入顺序不对, 导致历史长度"等效于"实际的 + 1 cycle 延迟。
      更严重的是: 如果 BTB 预测持续错误, history 长期污染。
    coremark_relevance: >
      降低分支预测准确率, 增加 flush 频率, 降低 IPC。
    confidence: "85% — else 分支逻辑确认, 但与 tage_update 的时序关系需要波形验证"
    severity_change: "保持 critical (影响分支预测全局)"

