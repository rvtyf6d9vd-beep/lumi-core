  # ──────────────────────────────────────────────
  # 指令 3：M2-S1 Task 0 微架构详细审查
  # ──────────────────────────────────────────────
  - timestamp: "20:00:00"
    role: hw-design
    session_mode: main
    action: m2_s1_microarch_review
    details:
      description: >
        在进入 14 份模块详细设计文档之前，对 M1 定版的微架构进行全面审查。
        审查流水线划分、模块边界、接口定义和数据通路，确认是否需要调整，避免设计阶段返工。
      user_request: >
        在进行具体的模块设计文档之前，先做一轮微架构的详细审查，看看从模块划分或者流水线设计上是否需要调整。
      steps:
        - "Step 1: 流水线架构审查 — 8 级流水线深度、FU 配比、LTAGE 分支预测、旁路网络、冒险处理"
        - "Step 2: 模块划分审查 — 14 份设计文档的模块边界合理性"
        - "Step 3: 模块间接口审查 — 8 组关键接口完整性"
        - "Step 4: GEM5 性能模型交叉校验 — gem5 参数与 platform-spec 一致性"
        - "Step 5: 输出审查报告 HTML + 指令记录 + Change Notices"
      key_findings:
        - "D-001 (中): Spec D 级对应 GEM5 Decode1+Decode2，E1+E2 对应 GEM5 Execute 单级 (命名差异)"
        - "D-002 (关键): Spec FU 配比严重落后 GEM5 优化模型 (3xALU vs 4xALU, MUL 3c vs 1c, 1xLSU vs 2xLSU)"
        - "D-003 (低): Spec 误判率 <1%，GEM5 实测 CoreMark 1.19%"
        - "D-004 (中): Spec 旁路遗漏 W→D 和 FPU→D 路径"
        - "D-005 (中): Spec 未记录推测性 Load 延迟预测和 skip-stalled 机制"
        - "D-006 (关键): Vector 扩展流水线交互完全未定义"
        - "D-007 (关键): Debug halt/resume、FPU/Vector 同步、锁步比较器接入点 3 个接口缺失"
        - "D-008 (关键): Dhrystone 目标 3.8 vs 实测 1.65 DMIPS/MHz 差距巨大"
      options_and_decisions:
        - topic: "FU 配比差异处理"
          options:
            - "更新架构说明书 (将 spec 对齐到 GEM5 优化后的配置)"
            - "更新 GEM5 模型 (回退 GEM5 优化，对齐 spec 原始配置)"
            - "各自保留，在文档中说明差异"
          decision: "更新架构说明书 (将 spec §4.3 对齐到 GEM5 优化后的配置)"
        - topic: "文档拆分方案"
          options:
            - "保持原 14 份 (不拆分)"
            - "拆分为 16 份 (interrupt-clic-plic 拆为 2 份, multicore-dft 拆为 2 份)"
          decision: "拆分为 16 份 (interrupt-clic-plic → clic-plic.html + exception-handling.html, multicore-dft → multicore-lockstep.html + dft-security.html)"
      decisions_executed:
        - "DEC-001: platform-spec.html §4.3 FU 配比更新为 4xALU + 1xMUL + 1xDIV + 2xLSU + 1xFPU + 1xMISC"
        - "DEC-002: interrupt-clic-plic.html 拆分为 clic-plic.html + exception-handling.html"
        - "DEC-003: multicore-dft.html 拆分为 multicore-lockstep.html + dft-security.html"
        - "DEC-004: platform-spec.html §4.6.1 补充 W→D 和 FPU→D 旁路路径"
        - "DEC-005: platform-spec.html §4.6.3 补充 skip-stalled 机制和推测性 Load 延迟预测说明"
        - "DEC-006: Dhrystone 目标下调 — 待用户后续决策"
        - "DEC-007: 3 个缺失接口定义 — 待 M2-S1 设计文档中定义"
      rules_checked: ["03", "06", "16", "20", "22"]
    outcome: >
      审查完成。生成了微架构审查报告 HTML (m2-s1-microarch-review.html)，
      更新了 platform-spec.html v1.0.2 (FU 配比、旁路网络、冒险处理、误判率)，
      追加了 risk-register.yaml (RISK-006~010)，
      向 4 个角色发送了 Change Notices。
      M2-S1 模块设计文档清单从 14 份冻结为 16 份。

