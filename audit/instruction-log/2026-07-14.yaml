        -F: "SA-5: 简单弃用 slot 2 写回 (会导致寄存器值丢失)"

  - id: "T-MS3-S2-4.2"
    title: "SA-10 修复 Part A — m_bypass_valid 输出 (memory_stage)"
    status: COMPLETE
    date: "2026-07-14"
    details:
      - "lumi_memory_stage.sv: 新增 m_bypass_valid 输出端口 (logic [ISSUE_WIDTH-1:0])"
      - "组合逻辑: load 旁路仅在 mem_ready_in=1 (SRAM 读完成) 时拉高"
      - "  - Load 指令: m_bypass_valid = m_valid & mem_ready_in"
      - "  - Store 指令: m_bypass_valid = 0 (store 不需 bypass)"
      - "  - 其他指令: m_bypass_valid = m_valid (ALU/branch 等)"
      - "原理: 多周期 load 期间 m_valid_r (E1→M) 与 m_result_out (M→W) 不同步"
    files_modified:
      - "src/rtl/core/lumi_memory_stage.sv (新增 m_bypass_valid 端口 + 组合逻辑)"

  - id: "T-MS3-S2-4.3"
    title: "SA-10 修复 Part B — bypass 接线改用 m_bypass_valid (core_top)"
    status: COMPLETE
    date: "2026-07-14"
    details:
      - "lumi_core_top.sv: bypass 接线 .m_valid 改用 m_bypass_valid (与 m_result 同步)"
      - "新增 m_bypass_valid wire 声明 (logic [ISSUE_WIDTH-1:0])"
      - "memory_stage 实例加 m_bypass_valid 输出端口"
      - "原理: 旁路 valid 必须与 m_result 在同一周期有效, 否则返回旧数据"
    files_modified:
      - "src/rtl/core/lumi_core_top.sv (wire 声明 + bypass 接线 + 实例输出)"

  - id: "T-MS3-S2-4.4"
    title: "SA-10 修复 Part C — load 捕获条件修正 (mem_ready_in only)"
    status: COMPLETE
    date: "2026-07-14"
    details:
      - "lumi_memory_stage.sv: load 捕获条件改为 if (mem_ready_in) (不依赖 state_reg)"
      - "原 v2 错误: '还原为每 cycle 捕获' 会污染 m_pipe_result"
      - "  - Load 等待 SRAM 期间, mem_rdata_in 可能是 ICACHE 预取/另一端口数据"
      - "  - 每 cycle 捕获会污染 m_pipe_result → 最终进入 regfile"
      - "正确条件: 仅在 mem_ready_in=1 时捕获 (SRAM 读完成)"
      - "双保险: m_bypass_valid 防止 load 等待期间旁路返回旧数据"
      - "        mem_ready_in 条件捕获防止 m_pipe_result 被无关 SRAM 数据污染"
    files_modified:
      - "src/rtl/core/lumi_memory_stage.sv (m_pipe_result 捕获条件)"

  - id: "T-MS3-S2-4.5"
    title: "SA-11 修复 — crt0_v1.S 添加 trap handler"
    status: COMPLETE
    date: "2026-07-14"
    details:
      - "crt0_v1.S: BSS clear 之后添加 mtvec 设置:"
      - "  la t0, _trap_handler"
      - "  csrw mtvec, t0"
      - "trap handler (halt-and-report 策略):"
      - "  (1) lui 0x40 + addi -32 构造 0x3FFE0 地址"
      - "      (注意: 0xFE0 超出 addi 12-bit signed 范围, 需用 lui 0x40 + addi -32)"
      - "  (2) 写失败标记 0xDEAD0001 到 0x3FFE0"
      - "  (3) 写 mcause 到 0x3FFE4, mepc 到 0x3FFE8"
      - "  (4) li a0, 1; li a7, 93; ecall 退出"
      - "原理: 任何 trap 都会写失败标记到 0x3FFE0 + 立即 ECALL 退出,避免 mtvec=0 死循环"
    files_modified:
      - "perf/benchmarks/libc/crt0_v1.S (trap handler + mtvec 设置)"

  - id: "T-MS3-S2-4.6"
    title: "SA-5 修复 — writeback slot 2 延迟写回"
    status: COMPLETE
    date: "2026-07-14"
    details:
