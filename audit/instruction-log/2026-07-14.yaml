      - "组合逻辑 slot2_need_stall 检测 slot 2 是否需延迟"
      - "写回仲裁增加 slot 2 pending 路径: 占用 slot 1 端口"
      - "时序逻辑: slot 2 数据寄存一拍, 下周期再尝试写回"
      - "风险: W 级增加 1 cycle 延迟, 但对正确性是必要的"
    files_modified:
