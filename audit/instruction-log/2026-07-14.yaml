    choices:
      option: "3 个审查问题全部修正 (采纳)"
      alternatives:
        - "A: trap handler 改用 lui 0x3F + addi 0xFE0 = 0x3FFE0 (推荐)"
        - "B: trap handler 改用 lui 0x3ff + addi 0xe0 = 0x3FF0E0 (原 v2 错误)"
        -C: "load 捕获: mem_ready_in 条件捕获 (推荐, 选 A)"
