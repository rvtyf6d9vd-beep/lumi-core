        - "step 6: 安装并配置 m4（brew install m4）"
        - "step 7: scons build/RISCV/gem5.opt -j8 编译成功"
        - "step 8: 运行 simple-riscv.py 验证（Hello world! 成功输出）"
        - "step 9: 保存构建脚本 scripts/build-gem5.sh"
      rules_checked: ["06", "16", "18"]
