        - problem: "zlib 头文件找不到（homebrew keg-only）"
          solution: "brew install zlib + 创建 /opt/homebrew/include 和 lib 符号链接"
        - problem: "GNU m4 缺失（/usr/bin/m4 为 Xcode CLT 占位符）"
          solution: "brew install m4 + export PATH=/opt/homebrew/opt/m4/bin:$PATH"
