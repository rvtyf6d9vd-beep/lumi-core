        实施参数调优和源码修改，CoreMark 从 4.62 提升至 5.54 CM/MHz (+19.9%)，
        达成 5.5 目标。
      user_request: >
        重新调整 Phase 9 计划方向，评估 MinorCPU 建模精度改善可能性，
        从三视角形成最终计划并实施。
      options_and_decisions:
        - topic: "fetch1ToFetch2BackwardDelay"
          options: ["保持 1", "设为 0 (零周期分支反馈)"]
          decision: "设为 0 (+6.7%)，pipeline.cc 中 f2ToF1 TimeBuffer 允许 0 delay"
        - topic: "executeLoadAssumedLatency"
          options: ["保持 2", "设为 1 (激进推测)", "设为 3 (保守)"]
          decision: "设为 1 (+12.4%)，推测性 L1D hit 预测，99.99%+ 命中率"
        - topic: "LSQ 内存解歧"
          options: ["保持无条件阻塞", "地址冲突检测"]
          decision: "地址冲突检测 (改善建模精度，CoreMark 无影响)"
        - topic: "Load Skip WAR 安全修复"
          options: ["禁止 load skip (保持原状)", "WAR 检查 + 寄存器快照"]
          decision: "回退到禁止 load skip (WAR 检查导致无限循环)"
      steps:
        - "Task 1.1: fetch1ToFetch2BackwardDelay=0 → 4.93 CM/MHz (+6.7%)"
        - "Task 1.2: executeLoadAssumedLatency=1 → 5.54 CM/MHz (+12.4%)"
        - "Task 1.3: executeMaxAccessesInMemory 测试 4/8 → 无效，回退"
        - "Task 2: 编译器选项 (-fmodulo-sched 等) → 无额外收益"
        - "Task 3: LSQ 内存解歧 (lsq.cc + buffers.hh) → CoreMark 无变化"
        - "Task 4: Load Skip WAR 修复 → crash (无限循环)，全部回退"
        - "Task 5: 回归测试 6/6 PASS，更新 perf-report.yaml"
      rules_checked: ["06", "16"]
    outcome: >
      成功。CoreMark Triple 4.62→5.54 CM/MHz (+19.9%)，目标 5.5 达成。
      关键参数: backwardDelay=0 + loadAssumedLatency=1。
      Scoreboard stalls 从 1.72M 降至 46K (-97.3%)。
      Load Skip WAR 修复尝试失败 (无限循环)，已回退并清理死代码。
      回归测试 6/6 PASS。

