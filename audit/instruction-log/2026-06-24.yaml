# Lumi 指令日志 — 2026-06-24

date: "2026-06-24"
entries:
  # ──────────────────────────────────────────────
  # 指令 1：建立研发流程规则（Errata + Bug 回归）
  # ──────────────────────────────────────────────
  - timestamp: "10:00:00"
    role: pm-infra
    session_mode: main
    action: add_rules
    details:
      description: "根据用户需求，新增两条研发流程规则（规则 20 / 21），创建关联模板文件并更新角色权限映射。"
      user_request: >
        维护一个Errata文档，专门记录Known Issue，直到该问题被彻底解决。
        到某个里程碑之后，每个发现的bug必须增加回归测试用例来保证修改正确。
      options_and_decisions:
        - topic: "规则编号"
          options: ["10-1/10-2（插入子编号）", "20/21（延续现有通用规则序号）", "E-1/R-1（独立编号体系）"]
          decision: "20/21（延续现有通用规则序号，保持与 top-rules.yaml 编号体系一致）"
        - topic: "规则分类"
          options: ["general（放入 top-rules.yaml）", "hardware-verify 子规则", "business 子规则"]
          decision: "general（两条规则均为跨角色通用质量流程，放入 top-rules.yaml 3.5 验证与质量章节）"
        - topic: "Errata 文档存放路径"
          options:
            - "audit/errata/known-issues.yaml（审计目录下，与 risk-register 并列）"
            - "docs/errata/known-issues.md（文档目录下，人类可读）"
            - "knowledge/errata.yaml（知识库目录下）"
          decision: "audit/errata/known-issues.yaml（归入审计体系，与规则 18 risk-register 并列，便于 QA 审计检查）"
        - topic: "规则 20 严重级别"
          options: ["critical", "high", "medium"]
          decision: "high（重要流程但非立即阻塞，QA审计兜底）"
        - topic: "规则 21 严重级别"
          options: ["critical", "high", "medium"]
          decision: "critical（回归遗漏会导致设计退化，直接影响交付质量）"
        - topic: "规则 21 触发里程碑"
          options: ["RTL Freeze", "Tape-out", "Verification Complete", "项目启动即生效"]
          decision: "RTL Freeze（RTL 冻结后代码变更有回归需求，前期快速迭代阶段不宜增加约束）"
        - topic: "适用角色（规则 20）"
          options: ["pm-infra + hw-design + hw-ver", "仅 hw-design + hw-ver", "全部角色（含 qa-audit）"]
          decision: "pm-infra + hw-design + hw-ver（qa-audit 通过 audit_role: true 间接检查）"
        - topic: "适用角色（规则 21）"
          options: ["hw-design + hw-ver + pm-infra", "仅 hw-ver", "全部角色"]
          decision: "hw-design + hw-ver + pm-infra（设计和验证均有责任增加回归用例，pm-infra 监督流程）"
      steps:
        - "step 1: 在 rules/top-rules.yaml 的 3.5 验证与质量章节末尾新增规则 20（Errata/Known Issue 维护）和规则 21（Bug 回归测试用例）"
        - "step 2: 在 rules/role-mapping.yaml 中为 pm-infra / hw-design / hw-ver 三个角色添加规则 20/21 引用"
        - "step 3: 在 rules/role-mapping.yaml 中为 pm-infra / hw-design / hw-ver 三个角色添加 audit/errata/** 写权限"
        - "step 4: 创建 audit/errata/known-issues.yaml 模板，包含示例条目格式和字段说明"
        - "step 5: 更新 rules/changelog.md 追加 v3.1 版本记录"
      rules_checked: ["16", "20", "21"]
    outcome: "成功。top-rules.yaml 新增 2 条规则，role-mapping.yaml 更新 3 角色权限，创建 errata 模板，changelog 更新。"

  # ──────────────────────────────────────────────
  # 指令 2：按规则 16 记录本次指令日志
  # ──────────────────────────────────────────────
  - timestamp: "10:15:00"
    role: pm-infra
    session_mode: main
    action: record_instruction_log
    details:
      description: "按规则 16（指令记录）要求，将本次对话中新增规则、创建文件、更新映射的全过程记录到指令日志。"
      user_request: "按规则 16 的要求，将本次对话中新增规则 20/21、创建 errata 模板、更新 role-mapping 和 changelog 的全过程记录下来。"
      steps:
        - "读取参考格式：audit/instruction-log/2026-06-10.yaml"
        - "撰写完整日志条目，包含规则内容、选择项记录、执行步骤"
        - "写入 audit/instruction-log/2026-06-24.yaml"
      rules_checked: ["16"]
    outcome: "指令日志已生成。"

  # ──────────────────────────────────────────────
  # 新增规则完整内容
  # ──────────────────────────────────────────────
  rule_snapshots:
    - id: "20"
      title: "Errata/Known Issue 维护"
      category: general
      severity: high
      applicable_roles: [pm-infra, hw-design, hw-ver]
      applicable_phases: [design, implementation, verification, delivery]
      description: >
        维护一份 Errata/Known Issue 文档，专门记录所有已知问题（Known Issue / Errata），
        直到该问题被彻底解决。Errata 条目应包含：问题标识、简要描述、发现日期、
        影响范围、当前状态（open/resolved）、临时规避方案（如有）等。
        问题解决后更新状态为 resolved 并注明解决日期和方式，但保留记录不删除。
      check_type: automated
      check_criteria:
        - "audit/errata/known-issues.yaml 存在且格式合规"
        - "所有已知问题在 errata 中有对应条目"
        - "已解决问题保留记录且标注 resolved"
      audit_role: true

    - id: "21"
      title: "Bug 回归测试用例"
      category: general
      severity: critical
      applicable_roles: [hw-design, hw-ver, pm-infra]
      applicable_phases: [verification, delivery]
      description: >
        在达到 RTL Freeze 里程碑之后，每个发现的 Bug 必须增加对应的回归测试用例，
        以保证后续修改不会导致相同问题重现。回归测试用例随项目持续维护，
        直到该回归测试用例因设计变更不再适用（此时应更新或废弃该用例并记录原因）。
      check_type: automated
      check_criteria:
        - "每个已修复 Bug 有对应的回归测试用例"
        - "回归测试用例可追溯至对应的 Bug/Errata 记录"
        - "废弃的回归测试用例有废弃原因记录"
      audit_role: true

  # ──────────────────────────────────────────────
  # 指令 3：GEM5+ RISC-V CPU 建模技术可行性调研与筹备计划
  # ──────────────────────────────────────────────
  - timestamp: "14:00:00"
    role: hw-design
    session_mode: main
    action: research_and_plan
    details:
      description: "调研在 Lumi-Core 项目中基于 gem5/gem5+ 对 CPU 进行建模的技术可行性，并制定筹备计划。"
      user_request: "调研一下在Lumi-Core项目基于GEM5+对CPU进行建模的技术可行性，做一个相应的筹备计划"
      research_scope:
        - "gem5 模拟器基础能力与 CPU 模型（AtomicSimpleCPU/TimingSimpleCPU/MinorCPU/O3CPU）"
        - "gem5+ 框架（gem5+rtl + Verilator 集成，cycle-accurate 建模）"
        - "Lumi-Core Profile 全部扩展在 gem5 中的支持状态（Mandatory/Optional/Platform）"
        - "CLIC 中断控制器在仿真环境中的支持现状"
        - "自定义指令扩展的实现路径和难度评估"
      options_and_decisions:
        - topic: "CPU 模型选择"
          options: ["MinorCPU (in-order, 可参数化)", "O3CPU (out-of-order, 高精度)", "AtomicSimpleCPU (功能仿真)"]
          decision: "MinorCPU 作为首选建模起点（匹配 Lumi-Core in-order 微架构），AtomicSimpleCPU 用于 ISA 验证"
        - topic: "gem5 版本策略"
          options: ["锁定官方稳定版 (v24.0+)", "跟踪 develop 分支", "使用 tud-ccc fork"]
          decision: "锁定官方稳定版 (v24.0+)，补丁独立管理于 perf/gem5-model/patches/"
        - topic: "CLIC 实现策略"
          options: ["gem5 内从零实现", "参考 QEMU/Renode CLIC 移植", "外部模块集成"]
          decision: "gem5 内从零实现，参考 QEMU/Renode 和 pulp-platform/clic 作为参考"
        - topic: "渐进精度策略"
          options: ["先纯 gem5 Timing 模型后切换 gem5+rtl", "一步到位 gem5+rtl", "仅功能仿真"]
          decision: "先纯 gem5 MinorCPU 模型后切换 gem5+rtl（渐进式精度提升）"
      steps:
        - "step 1: 收集项目 Profile、规则文件、现有目录结构"
        - "step 2: Web 调研 gem5 RISC-V 扩展支持状态、CLIC 仿真支持、gem5+rtl 框架"
        - "step 3: 逐项分析 Lumi-Core Profile 34+ 扩展在 gem5 中的支持状态"
        - "step 4: 输出技术可行性结论（总体可行，中等风险）"
        - "step 5: 制定 6 阶段筹备计划（环境搭建 → 扩展补全 → 中断建模 → 微架构 → 基准测试 → 验证文档）"
        - "step 6: 将分析与计划整合为 MD 文件写入 docs/architecture/"
        - "step 7: 更新指令日志"
      rules_checked: ["06", "12", "14", "16", "18"]
    outcome: "成功。创建 docs/architecture/gem5-modeling-feasibility-analysis.md（341 行），含技术可行性分析和 6 阶段筹备计划。"

  # ──────────────────────────────────────────────
  # 指令 4：GEM5+ 环境搭建 — gem5 v24.1 编译与验证
  # ──────────────────────────────────────────────
  - timestamp: "16:00:00"
    role: hw-design
    session_mode: main
    action: environment_setup
    details:
      description: "按筹备计划阶段0，完成 gem5 v24.1 RISC-V 编译环境搭建，解决 macOS 兼容性问题，成功编译 gem5.opt 并通过基础 RISC-V 仿真验证。"
      user_request: "先完成必要文件的下载吧"
      options_and_decisions:
        - topic: "Python 版本"
          options: ["系统默认 Python 3.14", "Homebrew Python 3.12", "conda 环境"]
          decision: "Homebrew Python 3.12（venv 隔离，gem5 官方支持版本）"
        - topic: "m4 来源"
          options: ["macOS /usr/bin/m4（Xcode CLT shim）", "Homebrew m4（keg-only）"]
          decision: "Homebrew m4（/usr/bin/m4 仅为 Xcode CLT 占位符，实际未安装）"
      problems_encountered:
        - problem: "Python 3.14 与 scons 4.10.1 不兼容（MergeFlags 乱码 -l 标志）"
          solution: "创建 Python 3.12 venv 虚拟环境"
        - problem: "scons CheckLibWithHeader 在 macOS 上有 bug（zlib 检测失败）"
          solution: "修改 SConstruct 绕过 CheckLibWithHeader，改用 conf.TryLink() 直接测试"
        - problem: "scons env.Detect() 忽略 PYTHON_CONFIG 绝对路径"
          solution: "修改 defaults.py 支持环境变量覆盖 + SConstruct 添加绝对路径检查"
        - problem: "venv 不含 python3-config"
          solution: "创建 .venv/bin/python3-config 包装脚本指向 python3.12-config"
        - problem: "zlib 头文件找不到（homebrew keg-only）"
          solution: "brew install zlib + 创建 /opt/homebrew/include 和 lib 符号链接"
        - problem: "GNU m4 缺失（/usr/bin/m4 为 Xcode CLT 占位符）"
          solution: "brew install m4 + export PATH=/opt/homebrew/opt/m4/bin:$PATH"
      steps:
        - "step 1: 检查系统环境（Python/clang/scons/RISC-V 工具链）"
        - "step 2: 创建 perf/gem5-model/ 目录结构（configs/patches/scripts/docs/tests）"
        - "step 3: git clone --depth 1 --branch v24.1 gem5 源码"
        - "step 4: 创建 Python 3.12 venv 并安装 scons/mako/pydot/protobuf/numpy"
        - "step 5: 应用 macOS 兼容性补丁（SConstruct + defaults.py）"
        - "step 6: 安装并配置 m4（brew install m4）"
        - "step 7: scons build/RISCV/gem5.opt -j8 编译成功"
        - "step 8: 运行 simple-riscv.py 验证（Hello world! 成功输出）"
        - "step 9: 保存构建脚本 scripts/build-gem5.sh"
      rules_checked: ["06", "16", "18"]
    outcome: >
      成功。gem5 v24.1.0.3 编译完成（49MB gem5.opt），RISC-V 基础仿真验证通过
      （simple-riscv.py → Hello world!，exit tick 530893000）。
      共解决 6 项 macOS 兼容性问题，保存补丁文件于 patches/，构建脚本于 scripts/。

