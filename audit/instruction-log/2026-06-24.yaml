    role: pm-infra
    session_mode: main
    action: add_rule
    details:
      description: "新增规则 22: Skill 优先复用，要求任务执行前优先从 skills/ 目录查找可复用 Skill。"
      user_request: "新规则：建立一个skill列表，每当执行任务的时候，应该先从项目skill里看能不能使用，或者轻量修改后就能使用现有的skill"
      options_and_decisions:
        - topic: "规则编号"
          options: ["22（延续通用规则序号）", "HD-4（设计子规则）", "IT-3（基础设施子规则）"]
