      - "  发现 E1→M MUL/DIV 旁路时序 Critical 问题 (PA-02)"
      - "  FENCE 仅 1-cycle NOP 不 drain store buffer (PA-04)"
      - "Task 1.3 SoC 集成一致性: AXI4 128-bit/JTAG/ext_irq 三项接口 PASS"
