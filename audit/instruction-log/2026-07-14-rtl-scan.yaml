summary: >
  对 Lumi-Core 全部 28 个 RTL 文件、16 份设计文档、11 个 TB 文件及 66 个 directed 测试
  执行独立全局静态代码扫描。分析覆盖设计一致性、逻辑缺陷、验证完整性、需求追溯、
  架构合规五个维度。共发现 49 个问题: 8 Critical + 14 High + 18 Medium + 9 Low。
  关键发现: SoC 集成层 trap/CLIC/NMI 信号断路 (3× Critical), Cache Evict 丢数据,
  CSR 写与 HPM 竞争, CDC 同步器短路, E1→M 旁路时序错误, 8/13 Mandatory ISA 扩展缺失。
  全局参数 (XLEN/AXI/HPM/TCM/Cache/CLIC 等 9 项) 100% 合规。

operations:

