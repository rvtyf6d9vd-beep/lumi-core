      - "  发现 9 个偏差 (3 Critical, 3 High, 2 Medium, 1 Low)"
      - "  Critical: SoC trap 接口硬编码 (DC-01), CLIC CSR 未连接 (DC-02), NMI 硬接0 (DC-03)"
