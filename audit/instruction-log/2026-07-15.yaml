# ═══════════════════════════════════════════════════════════
# 未对齐 sh 合理性分析 + RTL 修正计划
# ═══════════════════════════════════════════════════════════

- timestamp: "2026-07-15T22:30:00+08:00"
  instruction: "分析未对齐 sh 指令是否合理，记录 error，制定 RTL 修正计划"
  context: |
    用户要求分析 CoreMark V1 产生的未对齐 sh 指令是否合理。
    如果合理，记录 error 并制定 RTL 修正计划。
  analysis:
    question: "未对齐 sh 是否合理？"
    answer: "是，合理的编译器行为"
    reasoning: |
      1. CoreMark core_main.c:209 执行 results[0].size = TOTAL_DATA_SIZE / num_algorithms
         当 TOTAL_DATA_SIZE=2000, num_algorithms=3 → size=666 (非 8 字节对齐)
      2. core_list_init 用 size 做偏移计算链表节点地址
         产生奇数地址 (如 0x7FFF)
      3. GCC -O2 对 ee_s16 (short) 生成 sh 是标准行为
         编译器假定 short 自然对齐 (2 字节边界)
      4. RISC-V 规范允许实现透明处理未对齐访问
         商业核心 (SiFive, Andes) 普遍支持
    conclusion: |
      未对齐 sh 是合理的软件假设。Lumi V1 应添加硬件支持。
  actions:
    - "更新 BUG-007 errata: 添加详细根因分析和结论"
    - "创建 RTL 修正计划: .qoder/specs/rtl-misalign-fix-plan.md"
    - "方案: Memory Stage 增加 ST_MISALIGN_SPLIT 状态，两周期拆分未对齐访问"
  files_modified:
    - "audit/errata/known-issues.yaml (BUG-007 更新)"
    - ".qoder/specs/rtl-misalign-fix-plan.md (新建)"
  status: "完成"

