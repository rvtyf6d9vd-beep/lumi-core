# Lumi 指令日志 — 2026-06-26

date: "2026-06-26"
entries:
  # ──────────────────────────────────────────────
  # 指令 1：设计产品需求文档 (PRD) 模板
  # ──────────────────────────────────────────────
  - timestamp: "10:00:00"
    role: pm-infra
    session_mode: main
    action: create_template
    details:
      description: "从处理器 IP 的产品需求出发，设计一个 HTML 格式的产品需求文档 (PRD) 模板，采用表格形式管理需求条目，包含状态栏、版本追溯和需求基线管理。"
      user_request: >
        帮我从处理器IP的产品需求出发，设计一个产品需求文档的模版，等我来填。
        这个模版最好是表格形式的，加入各种需求的状态栏，方便每条需求的版本管理和追溯。
        当需求定版以后，需要把所有需求的版本号都打上一个tag，这个需求集需要另一个版本号维护。
      options_and_decisions:
        - topic: "文档格式"
          options: ["HTML（项目规则 [14] 要求）", "Markdown", "YAML + 渲染脚本"]
          decision: "HTML（与现有 Lumi-Core-Profile.html 风格一致，支持彩色状态标签和响应式表格）"
        - topic: "需求分类体系"
          options: ["按处理器 IP 维度（ISA/性能/接口/安全/配置/软件/验证/非功能）", "按项目阶段", "按 RISC-V Profile 章节"]
          decision: "按处理器 IP 维度（8 个分类，覆盖从 ISA 到交付全流程）"
        - topic: "版本管理方案"
          options: ["双层版本（需求自身版本 + 基线版本）", "仅基线版本", "语义版本 + git tag"]
          decision: "双层版本：每条需求有自身版本号（v1.0/v1.1），需求集有独立基线版本号（BL-1.0），定版时统一打标"
        - topic: "基线标签列设计"
          options: ["表格内嵌基线标签列", "独立基线快照文件", "两者结合"]
          decision: "表格内嵌基线标签列 + 独立基线记录表（列显示最新基线，记录表追溯历史）"
      steps:
        - "step 1: 分析项目现有文档结构和 HTML 风格（Lumi-Core-Profile.html）"
        - "step 2: 设计 PRD 模板结构：文档元信息 + 8 类需求表格 + 状态/优先级定义 + 基线管理 + 追溯矩阵 + 变更历史"
        - "step 3: 设计需求核心字段：REQ-ID、名称、优先级、状态、版本、基线标签、来源、关联文档、验收标准、变更日期、备注"
        - "step 4: 设计基线管理机制：BL-x.x 版本号、定版规则、基线记录表（新增/变更/移除 REQ-ID）"
        - "step 5: 实现 HTML 模板，包含完整 CSS（状态徽章颜色、响应式表格、打印优化）"
        - "step 6: 每个分类预置 2-3 条灰色示例需求行"
        - "step 7: 更新指令记录"
      rules_checked: ["08", "14", "16"]
    outcome: "成功。创建 docs/project/product-requirements.html（771 行），包含 8 类需求表格、双层版本管理、基线记录表和追溯矩阵。"

  # ──────────────────────────────────────────────
  # 指令 2：为 PRD 模板添加交互功能和批量导入
  # ──────────────────────────────────────────────
  - timestamp: "11:00:00"
    role: pm-infra
    session_mode: main
    action: enhance_template
    details:
      description: "为 PRD HTML 模板添加内嵌 JavaScript 交互功能，支持在浏览器中直接增删改行、状态切换、筛选过滤、基线定版、导出 HTML、批量导入 CSV。"
      user_request: "怎么修改这个 HTML 文件呢？好像文件是静态的。基于以上需求，同时加入批量导入功能，提供一个导入模板。"
      options_and_decisions:
        - topic: "交互方式"
          options: ["内嵌 JavaScript（在浏览器中直接操作）", "数据+模板分离（YAML+Python 脚本）", "保持静态 HTML"]
          decision: "内嵌 JavaScript（用户选择，直接在浏览器中编辑、筛选、导入导出）"
      steps:
        - "step 1: 添加 CSS 交互样式（固定工具栏、可编辑单元格、模态框、拖拽区域、打印隐藏）"
        - "step 2: 为 8 个需求表格添加 data-cat 属性以支持 JS 定位"
        - "step 3: 实现浮动工具栏（分类选择、添加行、筛选、基线定版、导入导出按钮）"
        - "step 4: 实现行级操作（添加/删除/内联编辑、状态徽章点击循环切换、优先级切换）"
        - "step 5: 实现筛选功能（按状态、优先级、文本搜索，重置筛选）"
        - "step 6: 实现基线定版功能（输入基线版本号，为当前分类所有 Approved+ 需求统一打标）"
        - "step 7: 实现导出功能（下载包含所有修改的完整 HTML 文件）"
        - "step 8: 实现批量 CSV 导入（下载导入模板、拖拽/选择文件、CSV 解析、预览确认、导入到指定分类）"
        - "step 9: 更新指令记录"
      rules_checked: ["14", "16"]
    outcome: "成功。PRD 模板升级为交互式 HTML（1271 行），新增工具栏、增删改行、状态循环、筛选、基线定版、导出 HTML、批量导入 CSV（含模板下载、拖拽上传、预览确认）。"

