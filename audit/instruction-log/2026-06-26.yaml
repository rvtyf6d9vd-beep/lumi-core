        - "step 5: 运行脚本生成 baseline-BL-EXAMPLE.html 验证正确性"
        - "step 6: 修改 tagBaseline() JS 函数：收集全部 8 个分类的 Approved+ 需求，生成 YAML 并触发下载"
        - "step 7: 工具栏新增基线说明和审批人输入框"
        - "step 8: 简化基线记录表为只读索引表（链接到 baselines/ 目录的 YAML 和 HTML 文件）"
        - "step 9: 更新 Section 4 管理规则说明，反映新的文件分离流程"
        - "step 10: 更新指令记录"
      rules_checked: ["10", "14", "16"]
    outcome: "成功。创建 baselines/ 目录、示例 YAML、转换脚本。HTML 基线功能升级为文件导出模式，基线记录表简化为索引表。"

