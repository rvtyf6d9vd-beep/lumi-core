        将独立的基线版本号分离出来，创建为单独的基线需求文件。
        当需求池经过评审并冻结形成基线版本时，自动生成 baseline-{version}.yaml 文件。
        设计脚本将 YAML 生成可读 HTML。基线文件作为下游流程的权威参考。
      steps:
        - "step 1: 创建 docs/project/baselines/ 目录"
        - "step 2: 设计 YAML 基线文件 Schema（baseline 元数据 + statistics + requirements 快照）"
        - "step 3: 创建示例基线文件 baseline-BL-EXAMPLE.yaml（5 条需求）"
