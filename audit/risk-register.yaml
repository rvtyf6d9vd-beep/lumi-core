  - id: "RISK-015"
    title: "Task-1 文档结构不一致 — dft-security 8 章节非标准"
    severity: medium
    status: resolved
    reported_by: qa-audit
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      Task-1 双视角审查发现 dft-security.html 采用 8 章节结构 (其他 15 份均为
      7 章节), 且接口定义在 ch5 而非标准的 ch3。影响 M2 门禁结构一致性检查。
    mitigation: >
      已重构为标准 7 章节结构: ch2 合并 DFT+安全+物理约束, ch3 移前为接口
      定义, 新增 ch4 数据通路。导航栏从 8 锥点改为 7 锥点。
    resolution: "dft-security.html 重构为 7 章节标准结构"
    resolution_date: "2026-07-07"

  - id: "RISK-016"
    title: "12 份模块文档缺失交叉引用与关键需求未承接"
    severity: low
    status: resolved
    reported_by: qa-audit
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      Task-1 双视角审查发现 12 份文档缺关联模块交叉引用, 且关键需求
      LUMI-IPC-002 (Dhrystone), LUMI-AREA-001 (面积), LUMI-PWR-001/002 (功耗)
      无设计文档承接。影响需求追溯链完整性。
    mitigation: >
      已在 16 份文档中补充关联模块段落; 4 份文档补充关键需求引用;
      15 份文档补充审查报告引用; 16 份文档补充验证策略引用;
      8 份文档补充 GEM5 参数关联。
    resolution: "全部交叉引用与需求承接已补全"
    resolution_date: "2026-07-07"

  - id: "RISK-017"
    title: "接口表格格式不统一 (3列/4列混用, 列名不一致)"
    severity: low
    status: resolved
    reported_by: qa-audit
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      Task-1 双视角审查发现接口表格存在 3 列 (缺位宽) 与 4 列混用,
      且列名 "说明" 与 "描述" 不统一。影响 RTL 骨架接口定义提取。
    mitigation: >
      已统一为 4 列标准 (信号|方向|位宽|描述): 5 份文档 “说明”→"描述",
      4 份文档 3 列→ 4 列 (补位宽), multicore-lockstep M 级表 4 列 (含状态)
      重构为标准 4 列。
    resolution: "全部接口表格统一为 4 列标准格式"
    resolution_date: "2026-07-07"

