# Lumi 风险登记簿 (规则 18: 问题不允许跳过)
# 所有发现的问题必须记录在此，status 不允许为 skipped

version: "1.0"

risks:
  - id: "RISK-001"
    title: "Interrupt latency test & measurement deferred — SE mode limitation"
    severity: medium
    status: accepted
    reported_by: perf-bench
    reported_date: "2026-06-30"
    assigned_to: hw-arch
    description: >
      Interrupt latency measurement (target <= 16 cycles, LUMI-SYS-003) requires
      real hardware interrupt injection which is not supported in gem5 SE
      (syscall emulation) mode. The MinorCPU SE mode only supports system calls
      via ecall, not external interrupt sources (CLIC/PLIC). This affects both
      the latency test and the measurement of actual interrupt delivery time.
    mitigation: >
      Deferred to a future phase that implements gem5 FS (full-system) mode
      with CLIC SW interrupt support. Alternatively, a custom m5 pseudo-op
      could be added to inject a synthetic interrupt and measure the latency.
      In the meantime, pipeline analysis + static timing estimation used as proxy.
      Update (2026-07-06 REC-002): FS mode config created (lumi-interrupt-fs.py),
      CLIC wiring code ready, gem5 build pending.
      Update (2026-07-06 FS verified): All 4 FS mode tests PASS with
      AtomicSimpleCPU + RV32: PMP (111K), CLIC (6.9M), PLIC (13.4M),
      Smrnmi (23K ticks). CLIC auto-wiring still requires gem5 recompile.
    resolution: null
    resolution_date: null
    merged_from: ["RISK-004"]

  - id: "RISK-002"
    title: "CLIC/PLIC SE mode connection limitation"
    severity: medium
    status: accepted
    reported_by: hw-design
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      gem5 SE mode cannot connect CLIC/PLIC to CPU interrupt lines.
      The CLIC model is created but isa.getInterrupts(tc).setCLIC() fails
      in SE mode because there is no platform-level interrupt wiring.
      PLIC similarly cannot deliver interrupts to MEIP/SEIP signals.
    mitigation: >
      Software simulation of CLIC/PLIC logic in test programs validates
      arbitration/priority algorithms. Full interrupt delivery requires
      gem5 FS (full-system) mode with proper interrupt wiring.
      Update (2026-07-06 REC-002): FS mode config + CLIC wiring code ready,
      gem5 build pending for full resolution.
      Update (2026-07-06 FS verified): FS mode PMP/PLIC/Smrnmi verified.
      All 4 tests PASS with AtomicSimpleCPU + RV32 (PMP 111K, CLIC 6.9M,
      PLIC 13.4M, Smrnmi 23K ticks). CLIC auto-connect via RiscvInterrupts.clic
      SimObject param (C++ code ready). gem5 scons recompile in progress.
    resolution: null
    resolution_date: null

  - id: "RISK-003"
    title: "Smrnmi NMI delivery requires FS mode"
    severity: low
    status: mitigated
    reported_by: hw-design
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      NMI injection and delivery via Smrnmi CSRs cannot be tested in
      gem5 SE mode. CSR access (mnscratch/mnepc/mncause/mnstatus) can
      be validated, but actual NMI delivery requires FS mode.
    mitigation: >
      CSR read/write tests validate the register access path.
      NMI delivery testing deferred to FS mode implementation.
      Update (2026-07-06 REC-002): FS mode config ready, gem5 build pending.
      Update (2026-07-06 FS test): FS mode Smrnmi test runs 10M ticks,
      CPU executes normally. NMI delivery path not yet exercised (no CLIC wiring).
      Update (2026-07-06 FS verified): Smrnmi test PASSES (23K ticks) with
      m5_exit path. Smrnmi CSR access skipped (gem5 lacks Smrnmi extension, ERR-005).
    resolution: null
    resolution_date: null

  - id: "RISK-005"
    title: "gem5 AtomicSimpleCPU mepc+mret trap handler recovery broken"
    severity: medium
    status: accepted
    reported_by: hw-ver
    reported_date: "2026-07-06"
    assigned_to: hw-arch
    description: >
      gem5 AtomicSimpleCPU FS mode has a bug where csrw mepc followed by mret
      causes the CPU to jump to address 0x0 instead of the written mepc value.
      This makes trap-and-skip patterns non-functional. Root cause identified
      via ExecAll debug trace: after first trap (mepc=0x102fc), handler sets
      mepc=0x10300 and does mret, but second trap shows mepc=0x0.
    mitigation: >
      Tests avoid trap handler dependency. Unsupported CSR accesses (Smepmp,
      Smrnmi) are skipped at compile time. Future: test with MinorCPU or
      O3CPU which may have correct mepc+mret behavior.
    resolution: null
    resolution_date: null

  - id: "RISK-004"
    title: "Interrupt latency measurement requires FS mode (merged into RISK-001)"
    severity: medium
    status: resolved
    reported_by: perf-bench
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      Duplicate of RISK-001. Merged on 2026-07-01.
    mitigation: "See RISK-001"
    resolution: "Merged into RISK-001"
    resolution_date: "2026-07-01"

  # ──────────────────────────────────────────────
  # M2-S1 Task 0 微架构审查新增风险 (2026-07-07)
  # ──────────────────────────────────────────────
  - id: "RISK-006"
    title: "Dhrystone performance target gap (3.8 vs 1.65 DMIPS/MHz)"
    severity: high
    status: open
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-arch
    description: >
      M2-S1 微架构审查发现 Dhrystone 目标 >=3.8 DMIPS/MHz 与 GEM5 RV32 实测
      1.65 DMIPS/MHz 差距巨大 (2.3x)。对于顺序执行三发射处理器，3.8 DMIPS/MHz
      是非常激进的目标 (ARM Cortex-R82 公开数据约 2.5 DMIPS/MHz)。
      CoreMark 目标 5.5 CM/MHz 已达成 (实测 6.97)，但 Dhrystone 差距显著。
    mitigation: >
      建议将 Dhrystone 目标下调为 >=2.0 DMIPS/MHz (仍优于典型双发射)，
      或在 PRD 中标注为 "Stretch Goal"。待用户决策 (DEC-006)。
      用户决策 (2026-07-07): 保持 3.8 DMIPS/MHz 不变。后续通过 RTL 优化
      或编译器优化尝试接近目标。RISK-006 保持 open 状态。
    resolution: null
    resolution_date: null

  - id: "RISK-007"
    title: "Vector extension pipeline interaction undefined"
    severity: high
    status: resolved
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      M2-S1 微架构审查发现 Vector 扩展的流水线交互完全未定义。Vector 指令
      可能需要多周期执行，与顺序流水线的同步机制 (stall/skip) 未在 spec 中描述。
      GEM5 MinorCPU 未建模 Vector FU，Vector 指令行为未知。
    mitigation: >
      M2-S1 设计文档 fpu-vector.html 必须定义 Vector 指令的流水线交互机制：
      执行延迟、stall 策略、与 Issue 级的 busy 信号握手、异常处理。
      RTL 验证阶段需覆盖 Vector 指令的边界情况。
    resolution: >
      fpu-vector.html 已完整定义 Vector 流水线交互:
      - D-006a: Vector-FU 多步执行模型 (steps = VLEN/LMUL/SEW)
      - D-006b: Vector-LSQ 交互 (Vector Load/Store 序列化)
      - D-006c: Vector RegFile 冲突处理
      - DEC-007-2: FPU/Vector busy 信号握手 (Issue 级 stall 后序指令)
      GEM5 lumi_vector.py 8FU 模型已实现 (SimdFloat* opClass)
    resolution_date: "2026-07-07"

  - id: "RISK-008"
    title: "Debug halt/resume pipeline interaction undefined"
    severity: medium
    status: resolved
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      M2-S1 微架构审查发现 Debug halt/resume 与流水线的交互接口完全未定义。
      Debug halt 在哪个流水线级生效？Resume 后流水线如何重新填充？
      这些问题必须在设计文档中明确。
    mitigation: >
      M2-S1 设计文档 debug-trace.html 必须定义 halt 在 W 级生效
      (指令提交后)，Resume 后从 halt PC 重新取指。
      需定义 halt 信号传播路径和流水线 flush 策略。
    resolution: >
      debug-trace.html 已完整定义 Debug halt/resume 流水线交互:
      - DEC-007-1: halt 在 W 级生效 (当前指令提交后)
      - halt 延迟 0~8 cycle (halt_req 到 hart_halted)
      - debug_halt_check() 在 W 级检查 halt_pending
      - Resume 后从 halt PC 重新取指, 流水线 flush 后重新填充
      - dmcontrol.haltreq/resumereq 寄存器接口已定义
    resolution_date: "2026-07-07"

  - id: "RISK-009"
    title: "Lockstep comparator接入点未定义"
    severity: medium
    status: resolved
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      M2-S1 微架构审查发现锁步比较器接入点完全未定义。比较器接入哪个流水线级？
      比较哪些信号 (PC? 寄存器? 内存写?)？比较失败后的处理机制？
    mitigation: >
      M2-S1 设计文档 multicore-lockstep.html 必须定义比较在 W 级
      (写回前)，比较 PC + 目标寄存器号 + 写入数据。
      比较失败触发 NMI 或自定义异常。
    resolution: >
      multicore-lockstep.html 已完整定义锁步比较器:
      - DEC-007-3: W 级比较接入点 (commit_valid 时刻)
      - 比较信号: PC + rd (目标寄存器号) + rd_data (写入数据) + mem_write
      - 比较失败触发 NMI (via mismatch_irq 信号)
      - RTL 骨架 lumi_lockstep.sv 已实现 (ST_IDLE/ST_COMPARE/ST_MISMATCH/ST_RECOVER)
    resolution_date: "2026-07-07"

  - id: "RISK-010"
    title: "gem5 lacks Smepmp/Smrnmi extension support (ERR-004/005)"
    severity: low
    status: accepted
    reported_by: hw-ver
    reported_date: "2026-07-07"
    assigned_to: hw-arch
    description: >
      gem5 24.1 不支持 Smepmp (Enhanced PMP) 和 Smrnmi (Resumable NMI) 扩展。
      访问相关 CSR 触发 illegal-instruction trap。已在 ERR-004/005 登记。
      微架构审查确认这些扩展的 CSR 访问路径需在 RTL 验证阶段覆盖。
    mitigation: >
      PMP 测试跳过 Smepmp CSR 访问，Smrnmi 测试跳过所有 CSR 访问。
      完整测试需 RTL 或 RTL-accurate simulator。
      M2-S1 privilege-pmp.html 设计文档需标注 gem5 已知限制。
    resolution: null
    resolution_date: null

  # ──────────────────────────────────────────────
  # M2-S1 双审融合审查新增风险 (2026-07-07, Deepseek)
  # ──────────────────────────────────────────────
  - id: "RISK-011"
    title: "RTL critical path bottleneck at bypass mux (Issue stage)"
    severity: medium
    status: open
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      双审融合审查 (Deepseek D-017) 发现 5 路旁路 mux (5→1, 32bit = 160bit)
      在 I 级可能成为关键路径瓶颈。预估延迟 80~100ps, 占 1GHz 时序预算 (125ps)
      的 64~80%。若不优化可能导致时序违例。
    mitigation: >
      RTL 骨架中预留流水化分割点, 必要时将旁路 mux 拆为 2 级
      (I 级前半 + D 级后半)。设计文档 decode-issue.html 需描述旁路
      mux 的物理设计策略。
    resolution: null
    resolution_date: null

  - id: "RISK-012"
    title: "Area overrun risk (Core+TCM+Cache ~0.22~0.36mm² vs target ≤0.32mm²)"
    severity: medium
    status: open
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      双审融合审查 (Deepseek D-018) 面积预估上限 (~0.36mm²) 可能超过
      0.32mm² 目标。主要风险来自 LTAGE 12 表 (256Kbits) 和 TCM/Cache 容量。
      Core 部分约 0.15~0.25mm², 加 TCM/Cache 后接近目标上限。
    mitigation: >
      RTL 骨架完成后进行综合预估, 若超标需评估: (1) LTAGE 表数从 12
      缩减至 8; (2) Cache 容量从 16KB 降至 8KB; (3) 采用高密度 SRAM macro。
      面积超标时作为关键决策点触发用户评审。
    resolution: null
    resolution_date: null

  - id: "RISK-013"
    title: "1GHz timing tight (F2/M stage SRAM ~88% of budget)"
    severity: medium
    status: open
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      双审融合审查 (Deepseek 5.3) 分析 TSMC 28HPC 1GHz 时序可行性:
      F2 级 (ICache SRAM 读出) 和 M 级 (DCache SRAM 读出) 是最紧张的级,
      预估 90~110ps, 占 125ps 预算的 72~88%。整体评估可行但紧凑。
    mitigation: >
      需在 RTL 实现中关注 F2/M 级 SRAM macro 选型。优先选用高密度
      low-Vt SRAM macro, 必要时考虑将 F2/M 级拆分为 1.5 级。
      power-reset.html 设计文档需包含时钟域和时序约束分析。
    resolution: null
    resolution_date: null

  - id: "RISK-014"
    title: "Lockstep comparator dual-level granularity complexity"
    severity: low
    status: resolved
    reported_by: hw-design
    reported_date: "2026-07-07"
    assigned_to: hw-design
    description: >
      双审融合审查分歧项 (D-011): MiniMax 建议仅 W 级比较, Deepseek 建议
      W+M 双级比较。双级比较更全面但 Store Buffer 同步策略复杂, 可能增加
      设计复杂度和验证工作量。
    mitigation: >
      M2-S1 设计文档 multicore-lockstep.html 先以 W 级比较为基线设计,
      预留 M 级扩展接口。若 M+W 双级比较复杂度过高, 向用户提出简化方案
      (仅 W 级)。比较失败触发 NMI。
    resolution: >
      multicore-lockstep.html 已定义双级比较策略 (D-011):
      - 基线: W 级比较 (MiniMax 方案, 实现简单)
      - 预留: M 级扩展接口 (Deepseek 建议, 预留 compare_m 信号)
      - 文档明确: M 级扩展需 Store Buffer 同步策略, 推迟到 M3 评估
      - 当前仅实现 W 级, 复杂度可控
    resolution_date: "2026-07-07"

  # ──────────────────────────────────────────────
  # M2-S1 Task-1 文档审查修正新增风险 (2026-07-07)
