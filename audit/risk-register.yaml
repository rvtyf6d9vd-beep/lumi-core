# Lumi 风险登记簿 (规则 18: 问题不允许跳过)
# 所有发现的问题必须记录在此，status 不允许为 skipped

version: "1.0"

risks:
  - id: "RISK-001"
    title: "Interrupt latency test & measurement deferred — SE mode limitation"
    severity: medium
    status: accepted
    reported_by: perf-bench
    reported_date: "2026-06-30"
    assigned_to: hw-arch
    description: >
      Interrupt latency measurement (target <= 16 cycles, LUMI-SYS-003) requires
      real hardware interrupt injection which is not supported in gem5 SE
      (syscall emulation) mode. The MinorCPU SE mode only supports system calls
      via ecall, not external interrupt sources (CLIC/PLIC). This affects both
      the latency test and the measurement of actual interrupt delivery time.
    mitigation: >
      Deferred to a future phase that implements gem5 FS (full-system) mode
      with CLIC SW interrupt support. Alternatively, a custom m5 pseudo-op
      could be added to inject a synthetic interrupt and measure the latency.
      In the meantime, pipeline analysis + static timing estimation used as proxy.
      Update (2026-07-06 REC-002): FS mode config created (lumi-interrupt-fs.py),
      CLIC wiring code ready, gem5 build pending.
      Update (2026-07-06 FS verified): All 4 FS mode tests PASS with
      AtomicSimpleCPU + RV32: PMP (111K), CLIC (6.9M), PLIC (13.4M),
      Smrnmi (23K ticks). CLIC auto-wiring still requires gem5 recompile.
    resolution: null
    resolution_date: null
    merged_from: ["RISK-004"]

  - id: "RISK-002"
    title: "CLIC/PLIC SE mode connection limitation"
    severity: medium
    status: accepted
    reported_by: hw-design
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      gem5 SE mode cannot connect CLIC/PLIC to CPU interrupt lines.
      The CLIC model is created but isa.getInterrupts(tc).setCLIC() fails
      in SE mode because there is no platform-level interrupt wiring.
      PLIC similarly cannot deliver interrupts to MEIP/SEIP signals.
    mitigation: >
      Software simulation of CLIC/PLIC logic in test programs validates
      arbitration/priority algorithms. Full interrupt delivery requires
      gem5 FS (full-system) mode with proper interrupt wiring.
      Update (2026-07-06 REC-002): FS mode config + CLIC wiring code ready,
      gem5 build pending for full resolution.
      Update (2026-07-06 FS verified): FS mode PMP/PLIC/Smrnmi verified.
      All 4 tests PASS with AtomicSimpleCPU + RV32 (PMP 111K, CLIC 6.9M,
      PLIC 13.4M, Smrnmi 23K ticks). CLIC auto-connect via RiscvInterrupts.clic
      SimObject param (C++ code ready). gem5 scons recompile in progress.
    resolution: null
    resolution_date: null

  - id: "RISK-003"
    title: "Smrnmi NMI delivery requires FS mode"
    severity: low
    status: mitigated
    reported_by: hw-design
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      NMI injection and delivery via Smrnmi CSRs cannot be tested in
      gem5 SE mode. CSR access (mnscratch/mnepc/mncause/mnstatus) can
      be validated, but actual NMI delivery requires FS mode.
    mitigation: >
      CSR read/write tests validate the register access path.
      NMI delivery testing deferred to FS mode implementation.
      Update (2026-07-06 REC-002): FS mode config ready, gem5 build pending.
      Update (2026-07-06 FS test): FS mode Smrnmi test runs 10M ticks,
      CPU executes normally. NMI delivery path not yet exercised (no CLIC wiring).
      Update (2026-07-06 FS verified): Smrnmi test PASSES (23K ticks) with
      m5_exit path. Smrnmi CSR access skipped (gem5 lacks Smrnmi extension, ERR-005).
    resolution: null
    resolution_date: null

  - id: "RISK-005"
    title: "gem5 AtomicSimpleCPU mepc+mret trap handler recovery broken"
    severity: medium
    status: accepted
    reported_by: hw-ver
    reported_date: "2026-07-06"
    assigned_to: hw-arch
    description: >
      gem5 AtomicSimpleCPU FS mode has a bug where csrw mepc followed by mret
      causes the CPU to jump to address 0x0 instead of the written mepc value.
      This makes trap-and-skip patterns non-functional. Root cause identified
      via ExecAll debug trace: after first trap (mepc=0x102fc), handler sets
      mepc=0x10300 and does mret, but second trap shows mepc=0x0.
    mitigation: >
      Tests avoid trap handler dependency. Unsupported CSR accesses (Smepmp,
      Smrnmi) are skipped at compile time. Future: test with MinorCPU or
      O3CPU which may have correct mepc+mret behavior.
    resolution: null
    resolution_date: null

  - id: "RISK-004"
    title: "Interrupt latency measurement requires FS mode (merged into RISK-001)"
    severity: medium
    status: resolved
    reported_by: perf-bench
    reported_date: "2026-07-01"
    assigned_to: hw-arch
    description: >
      Duplicate of RISK-001. Merged on 2026-07-01.
    mitigation: "See RISK-001"
    resolution: "Merged into RISK-001"
    resolution_date: "2026-07-01"

