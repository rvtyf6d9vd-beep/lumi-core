summary: >
  设计文档→RTL 骨架映射审查。覆盖 16 份设计文档 (LUMI-DESIGN-001~016) 与 15 个 RTL 骨架模块。
  发现 25 项不一致: 5 项高严重度 (位宽/关键信号缺失), 13 项中严重度 (命名不一致/信号缺失),
  7 项低严重度 (可选信号/骨架阶段可延后)。整体 RTL 骨架与设计文档接口框架一致,
  但多处命名规范和信号粒度需要对齐。建议在 M3-S2 详细 RTL 实现前完成修正。
